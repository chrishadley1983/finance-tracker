function cleanPoop(id, poopIndex) {
  const pet = state.pets[id];
  if (!pet || pet.ranAway) return;
  if (pet.poopCount <= 0) return;
  pet.poopCount--;
  pet.cleanliness = clamp(pet.cleanliness + 5);
  pet.lastUpdated = simDate().toISOString();
  pet.criticalSince = null;
  playSound('pop');
  showFeedback('💨');
  // Spawn sparkle at poop location
  spawnSparkleAt(poopIndex);
  if (pet.poopCount === 0 && (!pet.messes || pet.messes.length === 0)) {
    showSpeechDirect(id, "All clean! \u2728");
    pet.cleanliness = clamp(pet.cleanliness + 5);
    pet.totalCleans = (pet.totalCleans || 0) + 1;
    pet.lastCleanedAt = simDate().toISOString();
    checkAchievements(pet);
    checkFullCareCombco(pet);
    checkMorningRoutine(pet);
  }
  saveState();
  render();
}

function cleanMess(id, messIdx) {
  const pet = state.pets[id];
  if (!pet || pet.ranAway) return;
  pet.messes = pet.messes || [];
  if (messIdx >= pet.messes.length) return;
  const mess = pet.messes[messIdx];
  mess.tapsLeft--;
  playSound('pop');
  if (mess.tapsLeft <= 0) {
    const boost = MESS_TYPES[mess.type]?.cleanBoost || 2;
    pet.cleanliness = clamp(pet.cleanliness + boost);
    pet.messes.splice(messIdx, 1);
    showFeedback('\u2728');
  }
  pet.lastUpdated = simDate().toISOString();
  if (pet.poopCount === 0 && pet.messes.length === 0) {
    showSpeechDirect(id, "All clean! \u2728");
    pet.cleanliness = clamp(pet.cleanliness + 5);
    pet.totalCleans = (pet.totalCleans || 0) + 1;
    pet.lastCleanedAt = simDate().toISOString();
    checkAchievements(pet);
    checkFullCareCombco(pet);
    checkMorningRoutine(pet);
  }
  saveState();
  render();
}

function spawnSparkleAt(index) {
  const container = document.getElementById('particles');
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'confetti-particle';
    s.style.background = '#fbbf24';
    s.style.left = (20 + Math.random() * 60) + '%';
    s.style.top = (40 + Math.random() * 30) + '%';
    s.style.animationDuration = '0.8s';
    container.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function enterBathMode() {
  bathMode = true;
  bathSwipes = 0;
  bathPointerDown = false;
  bathDistAccum = 0;
  const bathSpeech = ["Splish splash!", "Not the soap!", "Bubbles!"];
  showSpeechDirect(activePet, bathSpeech[Math.floor(Math.random() * bathSpeech.length)]);
  render();
}

function handleBathPointerDown(e) {
  if (!bathMode) return;
  bathPointerDown = true;
  bathLastX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
  bathLastY = e.clientY || (e.touches && e.touches[0].clientY) || 0;
  bathDistAccum = 0;
}

function handleBathPointerMove(e) {
  if (!bathMode || !bathPointerDown) return;
  const cx = e.clientX || (e.touches && e.touches[0].clientX) || 0;
  const cy = e.clientY || (e.touches && e.touches[0].clientY) || 0;
  const dx = cx - bathLastX;
  const dy = cy - bathLastY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  bathDistAccum += dist;
  bathLastX = cx;
  bathLastY = cy;

  if (bathDistAccum > 30) {
    bathSwipes++;
    bathDistAccum = 0;
    playSound('splash');
    // Spawn bubbles
    const container = document.getElementById('particles');
    for (let i = 0; i < 3; i++) {
      const b = document.createElement('div');
      b.className = 'heart-particle';
      b.textContent = '🫧';
      b.style.left = cx + (Math.random() * 40 - 20) + 'px';
      b.style.top = cy + 'px';
      container.appendChild(b);
      setTimeout(() => b.remove(), 1200);
    }
    const counter = document.getElementById('bath-counter');
    if (counter) counter.textContent = 'Scrubs: ' + Math.min(bathSwipes, 5) + '/5 🧽';

    if (bathSwipes >= 5) {
      completeBath();
    }
  }
}

function handleBathPointerUp() {
  bathPointerDown = false;
  bathDistAccum = 0;
}

function completeBath() {
  bathMode = false;
  const pet = state.pets[activePet];
  if (!pet || pet.ranAway) return;
  pet.cleanliness = clamp(pet.cleanliness + 35);
  pet.lastUpdated = simDate().toISOString();
  pet.criticalSince = null;
  pet.totalCleans = (pet.totalCleans || 0) + 1;
  pet.totalBaths = (pet.totalBaths || 0) + 1;
  pet.lastCleanedAt = simDate().toISOString();
  showSpeechDirect(activePet, "Squeaky clean!");
  spawnConfetti();
  playSound('clean');
  showFeedback('\u2728 Sparkly!');
  checkAchievements(pet);
  checkFullCareCombco(pet);
  checkMorningRoutine(pet);
  saveState();
  render();
}

// Toy usage
function useToy(id, toyId) {
  const pet = state.pets[id];
  if (!pet || pet.ranAway) return;
  pet.toys = pet.toys || {};
  if (!pet.toys[toyId] || pet.toys[toyId].usesLeft <= 0) {
    showSpeechDirect(id, TOYS[toyId].name + " is worn out! \u{1F622}");
    return;
  }
  pet.toys[toyId].usesLeft--;
  let happiness = TOYS[toyId].happiness;
  // Species favourite toy bonus
  if (SPECIES_FAV_TOY[pet.species] === toyId) {
    happiness = Math.round(happiness * 1.5);
  }
  pet.happiness = clamp(pet.happiness + happiness);
  pet.lastUpdated = simDate().toISOString();
  pet.criticalSince = null;
  // Track used toys for achievement
  pet.toysUsed = pet.toysUsed || [];
  if (!pet.toysUsed.includes(toyId)) pet.toysUsed.push(toyId);

  // Chance to spawn toy part mess
  pet.messes = pet.messes || [];
  if (Math.random() < 0.25 && pet.messes.length < 8) {
    pet.messes.push({ type: 'toypart', x: 15 + Math.random() * 70, y: 45 + Math.random() * 35, tapsLeft: 1 });
  }

  playSound('toy');
  showFeedback(TOYS[toyId].emoji + ' ' + TOYS[toyId].desc);
  if (pet.toys[toyId].usesLeft === 0) {
    setTimeout(() => showSpeechDirect(id, TOYS[toyId].name + " is worn out! \u{1F622}"), 1500);
  }
  checkAchievements(pet);
  saveState();
  render();
}

// Legacy cleanPet for backward compat
function cleanPet(id) {
  // Now handled by interactive poop tapping
  render();
}

function adoptNewPet(id) {
  state.pets[id] = null;
  saveState();
  hatchStep = 'name';
  hatchName = '';
  hatchSpecies = null;
  render();
}

function resetAll() {
  if (confirm('Reset ALL pets? This cannot be undone!')) {
    state = defaultState();
    saveState();
    hatchStep = 'name';
    hatchName = '';
    hatchSpecies = null;
    render();
  }
}

// ===== PARTICLES =====
function showFeedback(text) {
  const el = document.createElement('div');
  el.className = 'action-feedback';
  el.textContent = text;
  const wrap = document.querySelector('.pet-sprite-wrap');
  if (wrap) { wrap.appendChild(el); setTimeout(() => el.remove(), 1200); }
  render();
}

function spawnHearts() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = '❤️';
    el.style.left = (30 + Math.random() * 40) + '%';
    el.style.top = (40 + Math.random() * 20) + '%';
    el.style.animationDelay = (i * 0.1) + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

function spawnConfetti() {
  const container = document.getElementById('particles');
  const colors = ['#e74c3c', '#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#e91e63'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.left = (10 + Math.random() * 80) + '%';
    el.style.top = (10 + Math.random() * 30) + '%';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    el.style.animationDuration = (1 + Math.random()) + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// ===== SVG SPRITE RENDERING =====
function renderPetSVG(species, stage, mood, size, equipped) {
  const color = SPECIES[species]?.color || '#9b59b6';
  const scale = STAGE_SCALE[stage] || 0.7;
  // Darker/lighter shade helpers
  const darken = (c, amt) => {
    const n = parseInt(c.slice(1), 16);
    const r = Math.max(0, (n >> 16) - amt);
    const g = Math.max(0, ((n >> 8) & 0xFF) - amt);
    const b = Math.max(0, (n & 0xFF) - amt);
    return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
  };
  const lighten = (c, amt) => {
    const n = parseInt(c.slice(1), 16);
    const r = Math.min(255, (n >> 16) + amt);
    const g = Math.min(255, ((n >> 8) & 0xFF) + amt);
    const b = Math.min(255, (n & 0xFF) + amt);
    return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
  };
  const belly = lighten(color, 60);
  const darkColor = darken(color, 40);
  const cheekColor = lighten(color, 30);
  equipped = equipped || [];

  // ===== EGG =====
  if (stage === 'egg') {
    return `<svg viewBox="0 0 64 64" width="${size}" height="${size}" class="anim-wobble">
      <defs>
        <radialGradient id="egg-g" cx="40%" cy="35%"><stop offset="0%" stop-color="${lighten(color, 40)}"/><stop offset="100%" stop-color="${color}"/></radialGradient>
      </defs>
      <ellipse cx="32" cy="36" rx="16" ry="20" fill="url(#egg-g)"/>
      <ellipse cx="32" cy="46" rx="14" ry="6" fill="${darkColor}" opacity="0.15"/>
      <path d="M22,38 Q26,34 24,28" fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <path d="M38,36 Q40,30 37,25" fill="none" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <path d="M28,42 Q32,40 36,42" fill="none" stroke="${darkColor}" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
      <ellipse cx="27" cy="30" rx="2" ry="1.5" fill="white" opacity="0.25"/>
    </svg>`;
  }

  // Stage proportions: baby=big head, teen=lanky, adult=balanced, mythical=majestic
  const stageProps = {
    baby:    { headR: 14, bodyW: 11, bodyH: 10, legLen: 4, armLen: 5, eyeY: 28, mouthY: 36, feetY: 52 },
    kid:     { headR: 13, bodyW: 13, bodyH: 14, legLen: 6, armLen: 7, eyeY: 27, mouthY: 35, feetY: 54 },
    teen:    { headR: 12, bodyW: 12, bodyH: 16, legLen: 8, armLen: 8, eyeY: 26, mouthY: 34, feetY: 56 },
    adult:   { headR: 13, bodyW: 14, bodyH: 16, legLen: 7, armLen: 8, eyeY: 26, mouthY: 34, feetY: 55 },
    mythical:{ headR: 14, bodyW: 15, bodyH: 17, legLen: 7, armLen: 9, eyeY: 26, mouthY: 34, feetY: 55 },
  };
  const p = stageProps[stage] || stageProps.adult;
  const cx = 32, headY = 24;
  const bodyTop = headY + p.headR * 0.6;
  const bodyMid = bodyTop + p.bodyH / 2;

  // ===== MOOD ANIMATIONS =====
  let bodyAnimClass = 'anim-breathe';
  if (mood === 'sleeping') bodyAnimClass = 'anim-sleep-breathe';
  else if (mood === 'happy') bodyAnimClass = 'anim-happy-bounce';
  else if (mood === 'sad') bodyAnimClass = 'anim-sad-droop';

  const mythicalClass = stage === 'mythical' ? ' anim-mythical-glow' : '';

  // ===== BUILD SVG PARTS =====
  let shadow = `<ellipse cx="${cx}" cy="${p.feetY + 2}" rx="${p.bodyW * 0.9}" ry="3" fill="#1a1a2e" opacity="0.08"/>`;

  // --- SPECIES-SPECIFIC BODY ---
  let bodyParts = '';
  let tailParts = '';
  let earParts = '';
  let extraParts = ''; // wings, antenna, whiskers etc

  switch (species) {
    case 'blob': {
      // Blobby body with no distinct head — one amorphous shape with stubby arms
      const bw = p.bodyW + p.headR * 0.5;
      const bh = p.bodyH + p.headR * 0.6;
      bodyParts = `
        <g class="anim-blob-squish">
          <ellipse cx="${cx}" cy="${bodyMid - 2}" rx="${bw}" ry="${bh}" fill="${color}"/>
          <ellipse cx="${cx}" cy="${bodyMid + bh * 0.3}" rx="${bw * 0.65}" ry="${bh * 0.35}" fill="${belly}" opacity="0.5"/>
          <!-- Stubby arms -->
          <ellipse cx="${cx - bw - 2}" cy="${bodyMid}" rx="4" ry="6" fill="${color}" transform="rotate(-15 ${cx - bw - 2} ${bodyMid})"/>
          <ellipse cx="${cx + bw + 2}" cy="${bodyMid}" rx="4" ry="6" fill="${color}" transform="rotate(15 ${cx + bw + 2} ${bodyMid})"/>
          <!-- Stubby feet -->
          <ellipse cx="${cx - 6}" cy="${bodyMid + bh - 2}" rx="6" ry="4" fill="${darkColor}"/>
          <ellipse cx="${cx + 6}" cy="${bodyMid + bh - 2}" rx="6" ry="4" fill="${darkColor}"/>
        </g>`;
      break;
    }
    case 'cat': {
      // Round head with pointy ears, body, legs, curvy tail
      const innerEar = lighten(color, 80);
      earParts = `
        <g class="anim-ear-twitch" style="transform-origin: ${cx - 9}px ${headY - p.headR + 2}px">
          <polygon points="${cx - 15},${headY - p.headR + 4} ${cx - 9},${headY - p.headR - 10} ${cx - 3},${headY - p.headR + 4}" fill="${color}"/>
          <polygon points="${cx - 13},${headY - p.headR + 4} ${cx - 9},${headY - p.headR - 6} ${cx - 5},${headY - p.headR + 4}" fill="${innerEar}"/>
        </g>
        <g class="anim-ear-twitch" style="transform-origin: ${cx + 9}px ${headY - p.headR + 2}px; animation-delay: 1.5s">
          <polygon points="${cx + 15},${headY - p.headR + 4} ${cx + 9},${headY - p.headR - 10} ${cx + 3},${headY - p.headR + 4}" fill="${color}"/>
          <polygon points="${cx + 13},${headY - p.headR + 4} ${cx + 9},${headY - p.headR - 6} ${cx + 5},${headY - p.headR + 4}" fill="${innerEar}"/>
        </g>`;
      bodyParts = `
        <!-- Body -->
        <ellipse cx="${cx}" cy="${bodyMid}" rx="${p.bodyW}" ry="${p.bodyH}" fill="${color}"/>
        <ellipse cx="${cx}" cy="${bodyMid + 3}" rx="${p.bodyW * 0.6}" ry="${p.bodyH * 0.5}" fill="${belly}" opacity="0.4"/>
        <!-- Head -->
        <circle cx="${cx}" cy="${headY}" r="${p.headR}" fill="${color}"/>
        <!-- Legs -->
        <rect x="${cx - p.bodyW + 2}" y="${bodyMid + p.bodyH - 6}" width="7" height="${p.legLen}" rx="3" fill="${darkColor}"/>
        <rect x="${cx + p.bodyW - 9}" y="${bodyMid + p.bodyH - 6}" width="7" height="${p.legLen}" rx="3" fill="${darkColor}"/>
        <!-- Paws -->
        <ellipse cx="${cx - p.bodyW + 5.5}" cy="${bodyMid + p.bodyH + p.legLen - 7}" rx="5" ry="3" fill="${darkColor}"/>
        <ellipse cx="${cx + p.bodyW - 5.5}" cy="${bodyMid + p.bodyH + p.legLen - 7}" rx="5" ry="3" fill="${darkColor}"/>`;
      // Whiskers
      const wy = headY + 4;
      extraParts = `
        <g class="anim-whisker">
          <line x1="${cx - p.headR}" y1="${wy - 1}" x2="${cx - p.headR - 8}" y2="${wy - 3}" stroke="#1a1a2e" stroke-width="0.8" opacity="0.4"/>
          <line x1="${cx - p.headR}" y1="${wy + 1}" x2="${cx - p.headR - 8}" y2="${wy + 3}" stroke="#1a1a2e" stroke-width="0.8" opacity="0.4"/>
        </g>
        <g class="anim-whisker" style="animation-delay: 0.5s">
          <line x1="${cx + p.headR}" y1="${wy - 1}" x2="${cx + p.headR + 8}" y2="${wy - 3}" stroke="#1a1a2e" stroke-width="0.8" opacity="0.4"/>
          <line x1="${cx + p.headR}" y1="${wy + 1}" x2="${cx + p.headR + 8}" y2="${wy + 3}" stroke="#1a1a2e" stroke-width="0.8" opacity="0.4"/>
        </g>
        <!-- Nose -->
        <ellipse cx="${cx}" cy="${headY + 3}" rx="2" ry="1.5" fill="#ff9eb5"/>`;
      // Tail
      const tailAnim = mood === 'happy' ? 'anim-tail-happy' : 'anim-tail-wag';
      tailParts = `<g class="${tailAnim}" style="transform-origin: ${cx + p.bodyW - 2}px ${bodyMid + 4}px">
        <path d="M${cx + p.bodyW - 2},${bodyMid + 4} Q${cx + p.bodyW + 10},${bodyMid - 4} ${cx + p.bodyW + 8},${bodyMid - 14}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
      </g>`;
      break;
    }
    case 'fox': {
      // Pointy ears, white belly, bushy tail, pointed snout
      const innerEar = lighten(color, 80);
      earParts = `
        <g class="anim-ear-twitch" style="transform-origin: ${cx - 10}px ${headY - p.headR + 2}px">
          <polygon points="${cx - 17},${headY - p.headR + 5} ${cx - 10},${headY - p.headR - 12} ${cx - 3},${headY - p.headR + 5}" fill="${color}"/>
          <polygon points="${cx - 15},${headY - p.headR + 5} ${cx - 10},${headY - p.headR - 8} ${cx - 5},${headY - p.headR + 5}" fill="${innerEar}"/>
        </g>
        <g class="anim-ear-twitch" style="transform-origin: ${cx + 10}px ${headY - p.headR + 2}px; animation-delay: 2s">
          <polygon points="${cx + 17},${headY - p.headR + 5} ${cx + 10},${headY - p.headR - 12} ${cx + 3},${headY - p.headR + 5}" fill="${color}"/>
          <polygon points="${cx + 15},${headY - p.headR + 5} ${cx + 10},${headY - p.headR - 8} ${cx + 5},${headY - p.headR + 5}" fill="${innerEar}"/>
        </g>`;
      bodyParts = `
        <!-- Body -->
        <ellipse cx="${cx}" cy="${bodyMid}" rx="${p.bodyW}" ry="${p.bodyH}" fill="${color}"/>
        <ellipse cx="${cx}" cy="${bodyMid + 3}" rx="${p.bodyW * 0.55}" ry="${p.bodyH * 0.55}" fill="white" opacity="0.7"/>
        <!-- Head -->
        <circle cx="${cx}" cy="${headY}" r="${p.headR}" fill="${color}"/>
        <!-- White face patch -->
        <ellipse cx="${cx}" cy="${headY + 4}" rx="${p.headR * 0.55}" ry="${p.headR * 0.5}" fill="white" opacity="0.6"/>
        <!-- Legs -->
        <rect x="${cx - p.bodyW + 2}" y="${bodyMid + p.bodyH - 6}" width="6" height="${p.legLen}" rx="3" fill="${darkColor}"/>
        <rect x="${cx + p.bodyW - 8}" y="${bodyMid + p.bodyH - 6}" width="6" height="${p.legLen}" rx="3" fill="${darkColor}"/>
        <!-- Paws -->
        <ellipse cx="${cx - p.bodyW + 5}" cy="${bodyMid + p.bodyH + p.legLen - 7}" rx="4.5" ry="3" fill="${darkColor}"/>
        <ellipse cx="${cx + p.bodyW - 5}" cy="${bodyMid + p.bodyH + p.legLen - 7}" rx="4.5" ry="3" fill="${darkColor}"/>`;
      // Nose
      extraParts = `<polygon points="${cx},${headY + 5} ${cx - 2},${headY + 2} ${cx + 2},${headY + 2}" fill="#1a1a2e"/>`;
      // Bushy tail
      const tailAnim = mood === 'happy' ? 'anim-tail-happy' : 'anim-tail-wag';
      tailParts = `<g class="${tailAnim}" style="transform-origin: ${cx + p.bodyW}px ${bodyMid + 2}px">
        <path d="M${cx + p.bodyW},${bodyMid + 2} Q${cx + p.bodyW + 14},${bodyMid - 8} ${cx + p.bodyW + 10},${bodyMid - 18}" fill="${color}" stroke="${color}" stroke-width="6" stroke-linecap="round"/>
        <path d="M${cx + p.bodyW + 10},${bodyMid - 18} Q${cx + p.bodyW + 8},${bodyMid - 20} ${cx + p.bodyW + 6},${bodyMid - 18}" fill="white" stroke="white" stroke-width="3" stroke-linecap="round"/>
      </g>`;
      break;
    }
    case 'dragon': {
      // Horns, wings, spiky tail, belly plates, stubby arms
      earParts = `
        <!-- Horns -->
        <polygon points="${cx - 8},${headY - p.headR + 2} ${cx - 5},${headY - p.headR - 10} ${cx - 2},${headY - p.headR + 2}" fill="${darkColor}"/>
        <polygon points="${cx + 8},${headY - p.headR + 2} ${cx + 5},${headY - p.headR - 10} ${cx + 2},${headY - p.headR + 2}" fill="${darkColor}"/>`;
      bodyParts = `
        <!-- Body -->
        <ellipse cx="${cx}" cy="${bodyMid}" rx="${p.bodyW}" ry="${p.bodyH}" fill="${color}"/>
        <!-- Belly plates -->
        <ellipse cx="${cx}" cy="${bodyMid - 2}" rx="${p.bodyW * 0.45}" ry="${p.bodyH * 0.35}" fill="${belly}" opacity="0.5"/>
        <ellipse cx="${cx}" cy="${bodyMid + 4}" rx="${p.bodyW * 0.4}" ry="${p.bodyH * 0.25}" fill="${belly}" opacity="0.4"/>
        <ellipse cx="${cx}" cy="${bodyMid + 9}" rx="${p.bodyW * 0.3}" ry="${p.bodyH * 0.18}" fill="${belly}" opacity="0.3"/>
        <!-- Head -->
        <circle cx="${cx}" cy="${headY}" r="${p.headR}" fill="${color}"/>
        <!-- Nostrils -->
        <circle cx="${cx - 3}" cy="${headY + 5}" r="1.5" fill="${darkColor}" opacity="0.5"/>
        <circle cx="${cx + 3}" cy="${headY + 5}" r="1.5" fill="${darkColor}" opacity="0.5"/>
        <!-- Arms -->
        <ellipse cx="${cx - p.bodyW - 1}" cy="${bodyMid - 2}" rx="4" ry="7" fill="${color}" transform="rotate(-10 ${cx - p.bodyW - 1} ${bodyMid - 2})"/>
        <ellipse cx="${cx + p.bodyW + 1}" cy="${bodyMid - 2}" rx="4" ry="7" fill="${color}" transform="rotate(10 ${cx + p.bodyW + 1} ${bodyMid - 2})"/>
        <!-- Claws -->
        <circle cx="${cx - p.bodyW - 2}" cy="${bodyMid + 5}" r="2" fill="${darkColor}"/>
        <circle cx="${cx + p.bodyW + 2}" cy="${bodyMid + 5}" r="2" fill="${darkColor}"/>
        <!-- Legs -->
        <rect x="${cx - p.bodyW + 1}" y="${bodyMid + p.bodyH - 5}" width="8" height="${p.legLen}" rx="3" fill="${color}"/>
        <rect x="${cx + p.bodyW - 9}" y="${bodyMid + p.bodyH - 5}" width="8" height="${p.legLen}" rx="3" fill="${color}"/>
        <ellipse cx="${cx - p.bodyW + 5}" cy="${bodyMid + p.bodyH + p.legLen - 6}" rx="5.5" ry="3.5" fill="${darkColor}"/>
        <ellipse cx="${cx + p.bodyW - 5}" cy="${bodyMid + p.bodyH + p.legLen - 6}" rx="5.5" ry="3.5" fill="${darkColor}"/>`;
      // Wings
      const wingSize = stage === 'mythical' ? 1.4 : (stage === 'adult' ? 1.1 : 0.7);
      extraParts = `
        <g class="anim-wing-flap" style="transform-origin: ${cx - p.bodyW + 2}px ${bodyMid - 6}px">
          <path d="M${cx - p.bodyW + 2},${bodyMid - 6} Q${cx - p.bodyW - 8 * wingSize},${bodyMid - 18 * wingSize} ${cx - p.bodyW - 4 * wingSize},${bodyMid - 2}" fill="${color}" opacity="0.6"/>
          <path d="M${cx - p.bodyW + 2},${bodyMid - 6} Q${cx - p.bodyW - 12 * wingSize},${bodyMid - 14 * wingSize} ${cx - p.bodyW - 8 * wingSize},${bodyMid}" fill="${color}" opacity="0.4"/>
        </g>
        <g class="anim-wing-flap" style="transform-origin: ${cx + p.bodyW - 2}px ${bodyMid - 6}px; animation-delay: 0.1s">
          <path d="M${cx + p.bodyW - 2},${bodyMid - 6} Q${cx + p.bodyW + 8 * wingSize},${bodyMid - 18 * wingSize} ${cx + p.bodyW + 4 * wingSize},${bodyMid - 2}" fill="${color}" opacity="0.6"/>
          <path d="M${cx + p.bodyW - 2},${bodyMid - 6} Q${cx + p.bodyW + 12 * wingSize},${bodyMid - 14 * wingSize} ${cx + p.bodyW + 8 * wingSize},${bodyMid}" fill="${color}" opacity="0.4"/>
        </g>`;
      // Spiky tail
      const tailAnim = mood === 'happy' ? 'anim-tail-happy' : 'anim-tail-wag';
      tailParts = `<g class="${tailAnim}" style="transform-origin: ${cx}px ${bodyMid + p.bodyH - 2}px">
        <path d="M${cx},${bodyMid + p.bodyH - 2} Q${cx + 12},${bodyMid + p.bodyH + 6} ${cx + 18},${bodyMid + p.bodyH}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
        <polygon points="${cx + 18},${bodyMid + p.bodyH} ${cx + 22},${bodyMid + p.bodyH - 4} ${cx + 20},${bodyMid + p.bodyH + 3}" fill="${darkColor}"/>
      </g>`;
      break;
    }
    case 'robot': {
      // Boxy body, antenna, screen face, bolt details, track feet
      earParts = `
        <g class="anim-antenna" style="transform-origin: ${cx}px ${headY - p.headR}px">
          <line x1="${cx}" y1="${headY - p.headR}" x2="${cx}" y2="${headY - p.headR - 10}" stroke="#888" stroke-width="2"/>
          <circle cx="${cx}" cy="${headY - p.headR - 10}" r="3" fill="#ff6b6b">
            <animate attributeName="fill" values="#ff6b6b;#ffdd57;#ff6b6b" dur="2s" repeatCount="indefinite"/>
          </circle>
        </g>`;
      bodyParts = `
        <!-- Body -->
        <rect x="${cx - p.bodyW}" y="${bodyTop + 2}" width="${p.bodyW * 2}" height="${p.bodyH * 1.6}" rx="4" fill="${color}"/>
        <!-- Chest panel -->
        <rect x="${cx - p.bodyW + 3}" y="${bodyTop + 5}" width="${(p.bodyW - 3) * 2}" height="${p.bodyH * 0.8}" rx="2" fill="${darkColor}" opacity="0.3"/>
        <!-- Chest light -->
        <circle cx="${cx}" cy="${bodyMid + 2}" r="3" fill="#22c55e" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <!-- Bolts -->
        <circle cx="${cx - p.bodyW + 3}" cy="${bodyTop + 4}" r="1.5" fill="#888"/>
        <circle cx="${cx + p.bodyW - 3}" cy="${bodyTop + 4}" r="1.5" fill="#888"/>
        <circle cx="${cx - p.bodyW + 3}" cy="${bodyTop + p.bodyH * 1.5}" r="1.5" fill="#888"/>
        <circle cx="${cx + p.bodyW - 3}" cy="${bodyTop + p.bodyH * 1.5}" r="1.5" fill="#888"/>
        <!-- Head -->
        <rect x="${cx - p.headR}" y="${headY - p.headR}" width="${p.headR * 2}" height="${p.headR * 1.8}" rx="4" fill="${color}"/>
        <!-- Screen face background -->
        <rect x="${cx - p.headR + 3}" y="${headY - p.headR + 3}" width="${(p.headR - 3) * 2}" height="${p.headR * 1.2}" rx="2" fill="#1a1a2e" opacity="0.8"/>
        <!-- Arms -->
        <rect x="${cx - p.bodyW - 6}" y="${bodyMid - 4}" width="6" height="${p.armLen + 4}" rx="3" fill="#888"/>
        <rect x="${cx + p.bodyW}" y="${bodyMid - 4}" width="6" height="${p.armLen + 4}" rx="3" fill="#888"/>
        <!-- Hands -->
        <circle cx="${cx - p.bodyW - 3}" cy="${bodyMid + p.armLen + 1}" r="3.5" fill="#666"/>
        <circle cx="${cx + p.bodyW + 3}" cy="${bodyMid + p.armLen + 1}" r="3.5" fill="#666"/>
        <!-- Legs/Tracks -->
        <rect x="${cx - p.bodyW + 2}" y="${bodyTop + p.bodyH * 1.6 - 1}" width="7" height="${p.legLen}" rx="2" fill="#888"/>
        <rect x="${cx + p.bodyW - 9}" y="${bodyTop + p.bodyH * 1.6 - 1}" width="7" height="${p.legLen}" rx="2" fill="#888"/>
        <rect x="${cx - p.bodyW + 1}" y="${bodyTop + p.bodyH * 1.6 + p.legLen - 3}" width="9" height="4" rx="2" fill="#666"/>
        <rect x="${cx + p.bodyW - 10}" y="${bodyTop + p.bodyH * 1.6 + p.legLen - 3}" width="9" height="4" rx="2" fill="#666"/>`;
      break;
    }
  }

  // ===== EYES (mood-driven) =====
  const gap = species === 'robot' ? 6 : 7;
  const ey = species === 'blob' ? (bodyMid - 8) : (headY - 1);
  let eyes = '';
  const eyeColor = species === 'robot' ? '#22c55e' : '#1a1a2e';

  switch (mood) {
    case 'happy':
      if (species === 'robot') {
        // Happy robot: ^ ^ eyes on screen
        eyes = `<path d="M${cx - gap - 3},${ey + 2} L${cx - gap},${ey - 2} L${cx - gap + 3},${ey + 2}" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M${cx + gap - 3},${ey + 2} L${cx + gap},${ey - 2} L${cx + gap + 3},${ey + 2}" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>`;
      } else {
        eyes = `<g class="anim-blink" style="transform-origin: ${cx - gap}px ${ey}px">
          <circle cx="${cx - gap}" cy="${ey}" r="3.5" fill="${eyeColor}"/>
          <circle cx="${cx - gap + 1}" cy="${ey - 1}" r="1.3" fill="white"/>
        </g>
        <g class="anim-blink" style="transform-origin: ${cx + gap}px ${ey}px">
          <circle cx="${cx + gap}" cy="${ey}" r="3.5" fill="${eyeColor}"/>
          <circle cx="${cx + gap + 1}" cy="${ey - 1}" r="1.3" fill="white"/>
        </g>`;
        // Blush marks
        eyes += `<ellipse cx="${cx - gap - 5}" cy="${ey + 5}" rx="3" ry="1.5" fill="#ff9eb5" opacity="0.4"/>
          <ellipse cx="${cx + gap + 5}" cy="${ey + 5}" rx="3" ry="1.5" fill="#ff9eb5" opacity="0.4"/>`;
      }
      break;
    case 'sad':
      if (species === 'robot') {
        eyes = `<line x1="${cx - gap - 2}" y1="${ey - 1}" x2="${cx - gap + 2}" y2="${ey + 1}" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="${cx + gap - 2}" y1="${ey - 1}" x2="${cx + gap + 2}" y2="${ey + 1}" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round"/>`;
      } else {
        eyes = `<g class="anim-blink" style="transform-origin: ${cx - gap}px ${ey}px; animation-duration: 6s">
          <circle cx="${cx - gap}" cy="${ey}" r="2.5" fill="${eyeColor}"/>
          <circle cx="${cx - gap + 0.5}" cy="${ey - 0.5}" r="1" fill="white"/>
        </g>
        <g class="anim-blink" style="transform-origin: ${cx + gap}px ${ey}px; animation-duration: 6s">
          <circle cx="${cx + gap}" cy="${ey}" r="2.5" fill="${eyeColor}"/>
          <circle cx="${cx + gap + 0.5}" cy="${ey - 0.5}" r="1" fill="white"/>
        </g>`;
        // Sad eyebrows
        eyes += `<line x1="${cx - gap - 3}" y1="${ey - 5}" x2="${cx - gap + 2}" y2="${ey - 6}" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="${cx + gap + 3}" y1="${ey - 5}" x2="${cx + gap - 2}" y2="${ey - 6}" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>`;
        // Tear
        eyes += `<ellipse cx="${cx + gap + 3}" cy="${ey + 3}" rx="1.2" ry="2" fill="#60a5fa" opacity="0.6"/>`;
      }
      break;
    case 'eating':
      eyes = `<path d="M${cx - gap - 2},${ey} Q${cx - gap},${ey - 2} ${cx - gap + 2},${ey}" fill="none" stroke="${eyeColor}" stroke-width="2" stroke-linecap="round"/>
        <path d="M${cx + gap - 2},${ey} Q${cx + gap},${ey - 2} ${cx + gap + 2},${ey}" fill="none" stroke="${eyeColor}" stroke-width="2" stroke-linecap="round"/>`;
      break;
    case 'sleeping':
      eyes = `<line x1="${cx - gap - 3}" y1="${ey}" x2="${cx - gap + 3}" y2="${ey}" stroke="${eyeColor}" stroke-width="2" stroke-linecap="round"/>
        <line x1="${cx + gap - 3}" y1="${ey}" x2="${cx + gap + 3}" y2="${ey}" stroke="${eyeColor}" stroke-width="2" stroke-linecap="round"/>`;
      // Zzz
      eyes += `<text x="${cx + 16}" y="${ey - 8}" font-size="11" font-weight="800" fill="#6366f1" class="anim-sparkle">Z</text>
        <text x="${cx + 22}" y="${ey - 16}" font-size="9" font-weight="800" fill="#6366f1" class="anim-sparkle" style="animation-delay:0.4s">z</text>
        <text x="${cx + 26}" y="${ey - 22}" font-size="7" font-weight="800" fill="#6366f1" class="anim-sparkle" style="animation-delay:0.8s">z</text>`;
      break;
    default: // idle
      if (species === 'robot') {
        eyes = `<circle cx="${cx - gap}" cy="${ey}" r="2.5" fill="#22c55e"/>
          <circle cx="${cx + gap}" cy="${ey}" r="2.5" fill="#22c55e"/>`;
      } else {
        eyes = `<g class="anim-blink" style="transform-origin: ${cx - gap}px ${ey}px">
          <circle cx="${cx - gap}" cy="${ey}" r="3" fill="${eyeColor}"/>
          <circle cx="${cx - gap + 0.8}" cy="${ey - 0.8}" r="1.1" fill="white"/>
        </g>
        <g class="anim-blink" style="transform-origin: ${cx + gap}px ${ey}px">
          <circle cx="${cx + gap}" cy="${ey}" r="3" fill="${eyeColor}"/>
          <circle cx="${cx + gap + 0.8}" cy="${ey - 0.8}" r="1.1" fill="white"/>
        </g>`;
      }
  }

  // ===== MOUTH =====
  const my = species === 'blob' ? (bodyMid + 2) : (headY + 7);
  let mouth = '';
  switch (mood) {
    case 'happy':
      if (species === 'robot') {
        mouth = `<path d="M${cx - 4},${my - 1} Q${cx},${my + 3} ${cx + 4},${my - 1}" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>`;
      } else {
        mouth = `<ellipse cx="${cx}" cy="${my}" rx="4" ry="3" fill="#1a1a2e"/>
          <ellipse cx="${cx}" cy="${my - 0.5}" rx="2.5" ry="1" fill="#ff6b6b"/>`;
      }
      break;
    case 'sad':
      mouth = `<path d="M${cx - 4},${my + 1} Q${cx},${my - 3} ${cx + 4},${my + 1}" fill="none" stroke="${species === 'robot' ? '#ff6b6b' : '#1a1a2e'}" stroke-width="1.5" stroke-linecap="round"/>`;
      break;
    case 'eating':
      mouth = `<ellipse cx="${cx}" cy="${my}" rx="5" ry="4" fill="#1a1a2e"/>
        <ellipse cx="${cx}" cy="${my - 1}" rx="3" ry="1.5" fill="#ff6b6b"/>`;
      // Food particles
      mouth += `<circle cx="${cx - 6}" cy="${my + 2}" r="1" fill="#fbbf24" opacity="0.6"/>
        <circle cx="${cx + 5}" cy="${my + 1}" r="0.8" fill="#fbbf24" opacity="0.5"/>`;
      break;
    case 'sleeping':
      // Tiny peaceful smile
      mouth = `<path d="M${cx - 3},${my - 1} Q${cx},${my + 1} ${cx + 3},${my - 1}" fill="none" stroke="${species === 'robot' ? '#22c55e' : '#1a1a2e'}" stroke-width="1" stroke-linecap="round" opacity="0.5"/>`;
      break;
    default:
      if (species === 'robot') {
        mouth = `<line x1="${cx - 3}" y1="${my}" x2="${cx + 3}" y2="${my}" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>`;
      } else {
        mouth = `<path d="M${cx - 4},${my - 1} Q${cx},${my + 3} ${cx + 4},${my - 1}" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>`;
      }
  }

  // ===== ACCESSORIES (drawn as SVG) =====
  let accessoryParts = '';
  const hatY = species === 'blob' ? (bodyMid - (p.bodyH + p.headR * 0.5) - 2) : (headY - p.headR);

  equipped.forEach(accId => {
    const acc = ACCESSORIES[accId];
    if (!acc) return;
    switch (accId) {
      case 'party_hat':
        accessoryParts += `<polygon points="${cx - 8},${hatY + 2} ${cx},${hatY - 14} ${cx + 8},${hatY + 2}" fill="#8b5cf6"/>
          <circle cx="${cx}" cy="${hatY - 14}" r="2" fill="#fbbf24"/>
          <line x1="${cx - 5}" y1="${hatY - 3}" x2="${cx + 5}" y2="${hatY - 3}" stroke="#fbbf24" stroke-width="1"/>
          <line x1="${cx - 3}" y1="${hatY - 7}" x2="${cx + 3}" y2="${hatY - 7}" stroke="#22c55e" stroke-width="1"/>`;
        break;
      case 'crown':
        accessoryParts += `<g>
          <path d="M${cx - 10},${hatY + 2} L${cx - 8},${hatY - 8} L${cx - 3},${hatY - 2} L${cx},${hatY - 10} L${cx + 3},${hatY - 2} L${cx + 8},${hatY - 8} L${cx + 10},${hatY + 2} Z" fill="#fbbf24"/>
          <rect x="${cx - 10}" y="${hatY}" width="20" height="3" rx="1" fill="#f59e0b"/>
          <circle cx="${cx}" cy="${hatY - 1}" r="1.5" fill="#ef4444"/>
          <circle cx="${cx - 6}" cy="${hatY - 1}" r="1" fill="#3b82f6"/>
          <circle cx="${cx + 6}" cy="${hatY - 1}" r="1" fill="#22c55e"/>
          <rect x="${cx - 9}" y="${hatY - 4}" width="18" height="1" fill="white" opacity="0.3" class="anim-crown-gleam"/>
        </g>`;
        break;
      case 'halo':
        accessoryParts += `<ellipse cx="${cx}" cy="${hatY - 4}" rx="12" ry="3" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.8"/>
          <ellipse cx="${cx}" cy="${hatY - 4}" rx="12" ry="3" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>`;
        break;
      case 'wizard_hat':
        accessoryParts += `<path d="M${cx - 12},${hatY + 4} Q${cx - 14},${hatY + 2} ${cx - 16},${hatY + 4} L${cx},${hatY - 20} L${cx + 16},${hatY + 4} Q${cx + 14},${hatY + 2} ${cx + 12},${hatY + 4} Z" fill="#4f46e5"/>
          <ellipse cx="${cx}" cy="${hatY + 3}" rx="16" ry="3" fill="#4f46e5"/>
          <circle cx="${cx - 3}" cy="${hatY - 6}" r="1.5" fill="#fbbf24" opacity="0.7"/>
          <circle cx="${cx + 4}" cy="${hatY - 12}" r="1" fill="#fbbf24" opacity="0.5"/>
          <circle cx="${cx - 1}" cy="${hatY - 16}" r="1.2" fill="#fbbf24" opacity="0.6"/>`;
        break;
      case 'flower':
        accessoryParts += `<g transform="translate(${cx + p.headR - 2}, ${hatY + 4})">
          <circle cx="0" cy="0" r="3" fill="#f472b6"/>
          <circle cx="3" cy="-2" r="2.5" fill="#fb7185"/>
          <circle cx="-3" cy="-2" r="2.5" fill="#fb7185"/>
          <circle cx="3" cy="2" r="2.5" fill="#fb7185"/>
          <circle cx="-3" cy="2" r="2.5" fill="#fb7185"/>
          <circle cx="0" cy="0" r="1.5" fill="#fbbf24"/>
        </g>`;
        break;
      case 'santa_hat':
        accessoryParts += `<path d="M${cx - 10},${hatY + 3} Q${cx},${hatY - 16} ${cx + 14},${hatY - 8}" fill="#ef4444"/>
          <rect x="${cx - 12}" y="${hatY + 1}" width="24" height="4" rx="2" fill="white"/>
          <circle cx="${cx + 14}" cy="${hatY - 8}" r="3" fill="white"/>`;
        break;
      case 'pumpkin':
        accessoryParts += `<g transform="translate(${cx}, ${hatY - 2})">
          <ellipse cx="0" cy="0" rx="8" ry="6" fill="#f97316"/>
          <rect x="-1" y="-8" width="2" height="4" rx="1" fill="#22c55e"/>
          <path d="M-4,-2 L-3,-4 L-2,-2" fill="#1a1a2e"/>
          <path d="M2,-2 L3,-4 L4,-2" fill="#1a1a2e"/>
          <path d="M-3,2 Q0,4 3,2" fill="none" stroke="#1a1a2e" stroke-width="1"/>
        </g>`;
        break;
      case 'birthday_crown':
        accessoryParts += `<g>
          <path d="M${cx - 10},${hatY + 2} L${cx - 7},${hatY - 6} L${cx - 2},${hatY} L${cx + 2},${hatY - 8} L${cx + 7},${hatY} L${cx + 10},${hatY - 6} L${cx + 12},${hatY + 2} Z" fill="#ec4899"/>
          <circle cx="${cx - 5}" cy="${hatY - 3}" r="1.5" fill="#fbbf24"/>
          <circle cx="${cx + 2}" cy="${hatY - 5}" r="1.5" fill="#22c55e"/>
          <circle cx="${cx + 9}" cy="${hatY - 3}" r="1.5" fill="#3b82f6"/>
        </g>`;
        break;
      case 'bunny_ears':
        accessoryParts += `<ellipse cx="${cx - 8}" cy="${hatY - 10}" rx="4" ry="10" fill="white"/>
          <ellipse cx="${cx - 8}" cy="${hatY - 10}" rx="2.5" ry="7" fill="#fda4af"/>
          <ellipse cx="${cx + 8}" cy="${hatY - 12}" rx="4" ry="10" fill="white" transform="rotate(10 ${cx + 8} ${hatY - 12})"/>
          <ellipse cx="${cx + 8}" cy="${hatY - 12}" rx="2.5" ry="7" fill="#fda4af" transform="rotate(10 ${cx + 8} ${hatY - 12})"/>`;
        break;
      case 'party_popper':
        accessoryParts += `<g transform="translate(${cx + p.headR + 2}, ${hatY})">
          <polygon points="0,8 -3,-4 3,-4" fill="#fbbf24"/>
          <circle cx="-2" cy="-6" r="1.5" fill="#ef4444"/>
          <circle cx="3" cy="-7" r="1" fill="#3b82f6"/>
          <circle cx="-4" cy="-3" r="1" fill="#22c55e"/>
          <circle cx="4" cy="-4" r="0.8" fill="#ec4899"/>
        </g>`;
        break;
      case 'sunglasses': {
        const sy = species === 'blob' ? (bodyMid - 8) : (headY - 1);
        accessoryParts += `<g>
          <rect x="${cx - gap - 5}" y="${sy - 3}" width="9" height="6" rx="2" fill="#1a1a2e"/>
          <rect x="${cx + gap - 4}" y="${sy - 3}" width="9" height="6" rx="2" fill="#1a1a2e"/>
          <line x1="${cx - gap + 4}" y1="${sy}" x2="${cx + gap - 4}" y2="${sy}" stroke="#1a1a2e" stroke-width="1.5"/>
          <line x1="${cx - gap - 5}" y1="${sy - 1}" x2="${cx - gap - 8}" y2="${sy - 3}" stroke="#1a1a2e" stroke-width="1.5"/>
          <line x1="${cx + gap + 5}" y1="${sy - 1}" x2="${cx + gap + 8}" y2="${sy - 3}" stroke="#1a1a2e" stroke-width="1.5"/>
          <!-- Lens shine -->
          <line x1="${cx - gap - 2}" y1="${sy - 1}" x2="${cx - gap}" y2="${sy + 1}" stroke="white" stroke-width="0.8" opacity="0.5"/>
          <line x1="${cx + gap - 1}" y1="${sy - 1}" x2="${cx + gap + 1}" y2="${sy + 1}" stroke="white" stroke-width="0.8" opacity="0.5"/>
        </g>`;
        break;
      }
      case 'monocle': {
        const sy = species === 'blob' ? (bodyMid - 8) : (headY - 1);
        accessoryParts += `<circle cx="${cx + gap}" cy="${sy}" r="5" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
          <line x1="${cx + gap + 4}" y1="${sy + 3}" x2="${cx + gap + 8}" y2="${sy + 12}" stroke="#fbbf24" stroke-width="1"/>`;
        break;
      }
      case 'heart_glasses': {
        const sy = species === 'blob' ? (bodyMid - 8) : (headY - 1);
        accessoryParts += `<g>
          <path d="M${cx - gap - 4},${sy} C${cx - gap - 4},${sy - 4} ${cx - gap},${sy - 4} ${cx - gap},${sy} C${cx - gap},${sy - 4} ${cx - gap + 4},${sy - 4} ${cx - gap + 4},${sy} L${cx - gap},${sy + 3} Z" fill="#ec4899" opacity="0.8"/>
          <path d="M${cx + gap - 4},${sy} C${cx + gap - 4},${sy - 4} ${cx + gap},${sy - 4} ${cx + gap},${sy} C${cx + gap},${sy - 4} ${cx + gap + 4},${sy - 4} ${cx + gap + 4},${sy} L${cx + gap},${sy + 3} Z" fill="#ec4899" opacity="0.8"/>
          <line x1="${cx - gap + 4}" y1="${sy}" x2="${cx + gap - 4}" y2="${sy}" stroke="#ec4899" stroke-width="1.5"/>
        </g>`;
        break;
      }
      case 'cape': {
        const capeTop = bodyMid - p.bodyH * 0.5;
        const capeBot = bodyMid + p.bodyH + p.legLen - 4;
        accessoryParts += `<g class="anim-cape">
          <path d="M${cx - p.bodyW + 1},${capeTop} Q${cx - p.bodyW - 6},${(capeTop + capeBot) / 2} ${cx - p.bodyW - 2},${capeBot} L${cx + p.bodyW + 2},${capeBot} Q${cx + p.bodyW + 6},${(capeTop + capeBot) / 2} ${cx + p.bodyW - 1},${capeTop} Z" fill="#ef4444" opacity="0.7"/>
          <path d="M${cx - p.bodyW + 1},${capeTop} L${cx + p.bodyW - 1},${capeTop}" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
        </g>`;
        break;
      }
      case 'bow_tie': {
        const bty = bodyTop + 4;
        accessoryParts += `<g>
          <polygon points="${cx},${bty} ${cx - 6},${bty - 4} ${cx - 6},${bty + 4}" fill="#ef4444"/>
          <polygon points="${cx},${bty} ${cx + 6},${bty - 4} ${cx + 6},${bty + 4}" fill="#ef4444"/>
          <circle cx="${cx}" cy="${bty}" r="2" fill="#fbbf24"/>
        </g>`;
        break;
      }
      case 'scarf': {
        const scy = bodyTop + 2;
        accessoryParts += `<g>
          <path d="M${cx - p.bodyW + 2},${scy} Q${cx},${scy + 4} ${cx + p.bodyW - 2},${scy}" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
          <rect x="${cx + p.bodyW - 6}" y="${scy}" width="5" height="12" rx="2" fill="#3b82f6"/>
          <line x1="${cx + p.bodyW - 5}" y1="${scy + 4}" x2="${cx + p.bodyW - 2}" y2="${scy + 4}" stroke="#2563eb" stroke-width="1"/>
          <line x1="${cx + p.bodyW - 5}" y1="${scy + 8}" x2="${cx + p.bodyW - 2}" y2="${scy + 8}" stroke="#2563eb" stroke-width="1"/>
        </g>`;
        break;
      }
      case 'star_badge': {
        const sbx = cx + p.bodyW - 4, sby = bodyMid - 2;
        accessoryParts += `<polygon points="${sbx},${sby - 4} ${sbx + 1.5},${sby - 1} ${sbx + 4},${sby - 1} ${sbx + 2},${sby + 1} ${sbx + 3},${sby + 4} ${sbx},${sby + 2} ${sbx - 3},${sby + 4} ${sbx - 2},${sby + 1} ${sbx - 4},${sby - 1} ${sbx - 1.5},${sby - 1}" fill="#fbbf24"/>`;
        break;
      }
    }
  });

  // ===== MYTHICAL SPARKLES =====
  let sparkles = '';
  if (stage === 'mythical') {
    sparkles = `<g>
      <circle cx="8" cy="10" r="2" fill="#fbbf24" class="anim-sparkle"/>
      <circle cx="52" cy="14" r="1.5" fill="#fbbf24" class="anim-sparkle" style="animation-delay:0.5s"/>
      <circle cx="12" cy="50" r="1.5" fill="#fbbf24" class="anim-sparkle" style="animation-delay:1s"/>
      <circle cx="54" cy="48" r="2" fill="#fbbf24" class="anim-sparkle" style="animation-delay:1.5s"/>
      <circle cx="30" cy="6" r="1.8" fill="#fbbf24" class="anim-sparkle" style="animation-delay:0.7s"/>
    </g>`;
  }

  return `<svg viewBox="0 0 64 64" width="${size}" height="${size}" class="${mythicalClass}">
    ${shadow}
    <g class="${bodyAnimClass}">
      ${tailParts}
      ${bodyParts}
      ${earParts}
      ${extraParts}
      ${eyes}
      ${mouth}
      ${accessoryParts}
    </g>
    ${sparkles}
  </svg>`;
}

// ===== MOOD DERIVATION =====
function getMood(pet, sleeping) {
  if (pet.ranAway) return 'sad';
  if (sleeping) return 'sleeping';
  const avg = (pet.hunger + pet.happiness + pet.cleanliness) / 3;
  if (avg > 70) return 'happy';
  if (avg > 40) return 'idle';
  return 'sad';
}

function getMoodFace(hunger, happiness, cleanliness) {
  const avg = (hunger + happiness + cleanliness) / 3;
  if (avg > 75) return { face: '😊', label: 'Thriving!' };
  if (avg > 50) return { face: '🙂', label: 'Content' };
  if (avg > 30) return { face: '😐', label: 'Meh...' };
  if (avg > 15) return { face: '😟', label: 'Sad' };
  return { face: '😢', label: 'Miserable!' };
}

function statColor(val) {
  if (val > 60) return '#22c55e';
  if (val > 30) return '#f59e0b';
  return '#ef4444';
}

// ===== HOLIDAY DETECTION =====
function getActiveHoliday() {
  const d = simDate();
  const month = d.getMonth() + 1;
  const day = d.getDate();
  for (const [key, h] of Object.entries(SPECIAL_DAYS)) {
    if (h.month === month && h.day === day) {
      if (h.who === 'all' || h.who === activePet) {
        return { key, ...h };
      }
    }
  }
  return null;
}

function getHolidayClass(key) {
  if (key.includes('birthday')) return 'birthday';
  return key;
}

// ===== SPEECH BUBBLES =====
function getSpeechMessage(pet, context) {
  const sleeping = isSleeping();
  const seed = pet.personalitySeed || 0.5;
  const holiday = getActiveHoliday();

  let pool = [];

  if (context === 'fed') {
    pool = ["Yummy!", "Delicious!", "More please!", "Nom nom nom!", "That hit the spot!"];
  } else if (sleeping) {
    pool = ["Zzz...", "*snore*", "\ud83d\udca4\ud83d\udca4\ud83d\udca4", "Five more minutes...", "*mumbles*"];
  } else {
    // Priority: most urgent stat first
    if (pet.hunger < 20) {
      pool.push("I'm starving!", "Feed meee!", "My tummy is rumbling...");
    } else if (pet.hunger < 40) {
      pool.push("I could eat...", "Got any snacks?");
    }
    if (pet.happiness < 20) {
      pool.push("I'm so bored...", "Nobody loves me \ud83d\ude22", "Play with me!");
    } else if (pet.happiness < 40) {
      pool.push("I'm a bit lonely...", "Wanna play?");
    }
    if (pet.cleanliness < 20) {
      pool.push("I smell funny...", "Bath time please!", "Eww poops everywhere");
    } else if (pet.cleanliness < 40) {
      pool.push("Getting a bit grubby...", "Could use a wash");
    }
    if (pet.hunger > 70 && pet.happiness > 70 && pet.cleanliness > 70) {
      pool.push("Life is great!", "I love you!", "Best day ever!", "Wheee!", "*happy dance*", "You're the best!");
    }
    // Holiday messages
    if (holiday) {
      if (holiday.key === 'christmas') pool.push("Merry Christmas!", "Where are my presents?", "Ho ho ho!", "Is that Santa?!");
      else if (holiday.key === 'halloween') pool.push("Boo!", "Trick or treat!", "Spooky!", "Nice costume!");
      else if (holiday.key.includes('birthday')) pool.push("Happy Birthday!", "Party time!", "Where's the cake?!", "Make a wish!");
      else if (holiday.key === 'easter') pool.push("Happy Easter!", "Where are the eggs?", "Hippity hop!");
      else if (holiday.key === 'new_year') pool.push("Happy New Year!", "New year, new me!", "Party!", "3... 2... 1!");
      else if (holiday.key === 'chinese_new_year') pool.push("Gong xi fa cai!", "Happy Lunar New Year!", "Dragon time! 🐲");
      else if (holiday.key === 'burns_night') pool.push("Och aye!", "Haggis time!", "To a haggis!");
      else if (holiday.key === 'valentines') pool.push("I love you!", "Be my valentine!", "💕💕💕");
      else if (holiday.key === 'pancake_day') pool.push("Flip it!", "More pancakes!", "Lemon and sugar please!");
      else if (holiday.key === 'holi') pool.push("Happy Holi!", "So many colours!", "🎨 Wheee!");
      else if (holiday.key === 'st_patricks') pool.push("Top o' the mornin'!", "Feeling lucky! ☘️", "Where's the pot of gold?");
      else if (holiday.key === 'april_fools') pool.push("Got ya!", "Is this a prank?", "April fools! 🤡", "Trust no one today!");
      else if (holiday.key === 'star_wars') pool.push("May the Force be with you!", "I am your pet!", "Do or do not!", "Beep boop!");
      else if (holiday.key === 'world_ocean') pool.push("Save the oceans!", "Splashy splash! 🌊", "I love the sea!");
      else if (holiday.key === 'canada_day') pool.push("Happy Canada Day! 🍁", "Sorry, eh?", "Maple syrup time!");
      else if (holiday.key === 'bastille_day') pool.push("Vive la France! 🇫🇷", "Ooh la la!", "Croissant please!");
      else if (holiday.key === 'intl_cat_day') pool.push("Meow! 🐱", "Purrrr...", "Cats rule!", "I am a cat today!");
      else if (holiday.key === 'mexican_independence') pool.push("¡Viva México! 🇲🇽", "Fiesta time!", "Olé!");
      else if (holiday.key === 'oktoberfest') pool.push("Prost! 🥨", "Pass the pretzels!", "Oompah oompah!");
      else if (holiday.key === 'day_of_dead') pool.push("Día de los Muertos! 💀", "Remember those we love", "Sugar skulls!");
      else if (holiday.key === 'diwali') pool.push("Happy Diwali! 🪔", "Festival of lights!", "So sparkly!");
      else if (holiday.key === 'st_andrews') pool.push("Happy St Andrew's Day!", "Scotland forever! 🏴󠁧󠁢󠁳󠁣󠁴󠁿", "Bagpipe time!");
      else if (holiday.key === 'winter_solstice') pool.push("Shortest day! ❄️", "Brrr it's cold!", "Cosy up!");
      else if (holiday.key === 'hogmanay') pool.push("Happy Hogmanay! 🥂", "Auld lang syne!", "See you next year!");
      else if (holiday.key === 'world_kindness') pool.push("Be kind today! 🤝", "You're amazing!", "Spread the love!");
      else pool.push("It's a special day!", "Party time!", holiday.emoji + " " + holiday.emoji);
    }
    // Add idle fallbacks if pool is empty or to add variety
    pool.push("...", "\ud83c\udfb5", "*looks around*", "What's over there?", "*bounces*");
  }

  // Use personalitySeed to weight selection
  const seedOffset = Math.floor(seed * pool.length);
  // Filter out the last message shown
  const lastMsg = lastSpeechMessage[pet.id];
  const filtered = pool.filter(m => m !== lastMsg);
  const usePool = filtered.length > 0 ? filtered : pool;
  const idx = (seedOffset + Math.floor(Math.random() * usePool.length)) % usePool.length;
  return usePool[idx];
}

function triggerSpeechBubble(petId, context) {
  const pet = state.pets[petId];
  if (!pet || pet.ranAway) return;
  const msg = getSpeechMessage(pet, context || 'idle');
  speechBubbleText[petId] = msg;
  lastSpeechMessage[petId] = msg;
  render();
  // Auto-hide after 3s
  if (speechTimers[petId]) clearTimeout(speechTimers[petId]);
  speechTimers[petId] = setTimeout(() => {
    speechBubbleText[petId] = null;
    render();
  }, 3000);
}

function startSpeechBubbleLoop(petId) {
  // Random interval between 8-12 seconds
  const scheduleNext = () => {
    const delay = 8000 + Math.random() * 4000;
    speechTimers[petId + '_loop'] = setTimeout(() => {
      const pet = state.pets[petId];
      if (pet && !pet.ranAway && petId === activePet && !activeGame) {
        triggerSpeechBubble(petId, 'idle');
      }
      scheduleNext();
    }, delay);
  };
  scheduleNext();
}

// Start speech bubble loops for both pets
startSpeechBubbleLoop('max');
startSpeechBubbleLoop('emmie');

// ===== ACCESSORIES =====
function getCareStreak(pet) {
  const history = pet.careHistory || [];
  let streak = 0;
  for (let i = history.length - 1; i >= 0; i--) {
    if (history[i] > 60) streak++;
    else break;
  }
  return streak;
}

function getMaxGameScore(pet) {
  const scores = pet.gameScores || {};
  let max = 0;
  for (const k of Object.keys(scores)) {
    if (scores[k] > max) max = scores[k];
  }
  return max;
}

function getPlayedGames(pet) {
  return Object.keys(pet.gameScores || {});
}

const STAGE_ORDER = ['egg', 'baby', 'kid', 'teen', 'adult', 'mythical'];
function hasReachedStage(pet, targetStage) {
  return STAGE_ORDER.indexOf(pet.stage) >= STAGE_ORDER.indexOf(targetStage);
}

function getUnlockedAccessories(pet) {
  const unlocked = [];
  const streak = getCareStreak(pet);
  const maxScore = getMaxGameScore(pet);
  const holiday = getActiveHoliday();

  for (const [id, acc] of Object.entries(ACCESSORIES)) {
    const rule = acc.unlock;
    let isUnlocked = false;
    if (rule === 'default') isUnlocked = true;
    else if (rule.startsWith('evolution_')) {
      const stage = rule.replace('evolution_', '');
      isUnlocked = hasReachedStage(pet, stage);
    }
    else if (rule.startsWith('care_streak_')) {
      const n = parseInt(rule.replace('care_streak_', ''));
      isUnlocked = streak >= n;
    }
    else if (rule.startsWith('game_score_')) {
      const n = parseInt(rule.replace('game_score_', ''));
      isUnlocked = maxScore >= n;
    }
    else if (rule === 'achievement_first_clean') {
      isUnlocked = (pet.totalCleans || 0) >= 1;
    }
    else if (rule.startsWith('holiday_')) {
      // Holiday accessories: unlocked if it's currently that holiday
      if (holiday) {
        const holidayAcc = HOLIDAY_ACCESSORIES[holiday.key];
        if (holidayAcc === id) isUnlocked = true;
      }
    }
    if (isUnlocked) unlocked.push(id);
  }
  return unlocked;
}

function getUnlockHint(rule) {
  if (rule.startsWith('evolution_')) return 'Evolve to ' + rule.replace('evolution_', '');
  if (rule.startsWith('care_streak_')) return rule.replace('care_streak_', '') + ' day streak';
  if (rule.startsWith('game_score_')) return 'Score ' + rule.replace('game_score_', '+');
  if (rule === 'achievement_first_clean') return 'Clean once';
  if (rule.startsWith('holiday_')) return 'Holiday special';
  return '???';
}

function toggleAccessory(petId, accId) {
  const pet = state.pets[petId];
  if (!pet) return;
  pet.equippedAccessories = pet.equippedAccessories || [];
  const idx = pet.equippedAccessories.indexOf(accId);
  if (idx >= 0) {
    pet.equippedAccessories.splice(idx, 1);
  } else {
    // Unequip any other accessory in same category
    const cat = ACCESSORIES[accId].category;
    pet.equippedAccessories = pet.equippedAccessories.filter(a => ACCESSORIES[a]?.category !== cat);
    pet.equippedAccessories.push(accId);
    // Check first accessory achievement
    checkAchievements(pet);
  }
  saveState();
  render();
}

// ===== ACHIEVEMENTS =====
function checkAchievements(pet) {
  if (!pet || pet.ranAway) return;
  pet.achievements = pet.achievements || [];
  const earned = new Set(pet.achievements);
  const newlyEarned = [];

  function award(id) {
    if (!earned.has(id) && ACHIEVEMENTS[id]) {
      pet.achievements.push(id);
      earned.add(id);
      newlyEarned.push(id);
    }
  }

  if ((pet.totalFeeds || 0) >= 1) award('first_feed');
  if ((pet.totalCleans || 0) >= 1) award('first_clean');
  if (Object.keys(pet.gameScores || {}).length >= 1) award('first_game');

  if (hasReachedStage(pet, 'kid') && pet.stage !== 'baby') award('evolve_kid');
  if (hasReachedStage(pet, 'teen')) award('evolve_teen');
  if (hasReachedStage(pet, 'adult')) award('evolve_adult');
  if (hasReachedStage(pet, 'mythical')) award('evolve_mythical');

  const streak = getCareStreak(pet);
  if (streak >= 3) award('care_streak_3');
  if (streak >= 7) award('care_streak_7');
  if (streak >= 14) award('care_streak_14');

  const maxScore = getMaxGameScore(pet);
  if (maxScore >= 20) award('game_score_20');
  if (maxScore >= 50) award('game_score_50');
  if (maxScore >= 100) award('game_score_100');

  if (getPlayedGames(pet).length >= 5) award('all_games');
  if ((pet.totalFeeds || 0) >= 10) award('fed_10');
  if ((pet.totalPets || 0) >= 20) award('petted_20');
  if ((pet.equippedAccessories || []).length >= 1) award('first_accessory');
  if ((pet.fullCareCombos || 0) >= 1) award('first_combo');
  if ((pet.totalBaths || 0) >= 10) award('bath_master');
  if ((pet.toysUsed || []).length >= Object.keys(TOYS).length) award('toy_collector');

  // Show toasts for newly earned
  newlyEarned.forEach((id, i) => {
    setTimeout(() => showAchievementToast(id), i * 500);
  });
}

function showAchievementToast(achievementId) {
  const ach = ACHIEVEMENTS[achievementId];
  if (!ach) return;
  playSound('evolve');
  const toast = document.createElement('div');
  toast.className = 'achievement-toast';
  toast.innerHTML = `
    <span class="toast-emoji">${ach.emoji}</span>
    <div class="toast-text">
      <span class="toast-title">${ach.name} unlocked!</span>
      <span class="toast-desc">${ach.desc}</span>
    </div>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3200);
}

// ===== RENDER =====
function render() {
  refreshPets();
  const sleeping = isSleeping();
  const pet = state.pets[activePet];
  const app = document.getElementById('app');
  const holiday = getActiveHoliday();

  // Apply holiday background
  if (holiday && HOLIDAY_BACKGROUNDS[holiday.key]) {
    document.body.style.background = HOLIDAY_BACKGROUNDS[holiday.key];
  } else {
    document.body.style.background = 'linear-gradient(135deg, #f3e8ff 0%, #fce7f3 50%, #fef3c7 100%)';
  }

  let html = '';

  // Header
  html += `<div class="header">
    <h1>🐾 Hadley Pets</h1>
    <button class="sim-toggle ${simMode?'active':''}" onclick="toggleSimMode()">
      ${simMode ? '⏩ SIM ON' : '🧪 Sim'}
    </button>
  </div>`;

  // Sim panel
  html += renderSimPanel();

  // Tab row
  html += `<div class="tab-row">
    <button class="tab-btn ${activePet==='max'?'active':''}" onclick="switchPet('max')">🦖 Max</button>
    <button class="tab-btn ${activePet==='emmie'?'active':''}" onclick="switchPet('emmie')">🦄 Emmie</button>
  </div>`;

  if (!pet) {
    // Hatch flow
    html += renderHatchScreen();
  } else {
    // Pet view
    html += renderPetView(pet, sleeping);
  }

  // Reset
  html += `<button class="reset-btn" onclick="resetAll()">🗑️ Reset All Pets</button>`;

  app.innerHTML = html;
}

function renderHatchScreen() {
  const ownerName = activePet === 'max' ? 'Max' : 'Emmie';

  if (hatchStep === 'name') {
    html += `
      <div class="anim-wobble" style="display:inline-block">${renderPetSVG('blob', 'egg', 'idle', 96)}</div>
      <h2>${ownerName}'s New Pet!</h2>
      <p>What will you name your pet?</p>
      <input class="name-input" id="name-input" type="text" placeholder="Enter a name..." maxlength="20"
        value="${escapeHtml(hatchName)}" oninput="hatchName=this.value;document.getElementById('next-btn').disabled=!this.value.trim()" autofocus>
      <br>
      <button class="primary-btn" id="next-btn" onclick="goToSpecies()" ${hatchName.trim()?'':'disabled'}>Next →</button>
    `;
  } else if (hatchStep === 'species') {
    html += `
      <h2>Choose ${escapeHtml(hatchName)}'s species!</h2>
      <div class="species-grid">`;
    for (const [id, info] of Object.entries(SPECIES)) {
      html += `<button class="species-btn ${hatchSpecies===id?'selected':''}" onclick="selectSpecies('${id}')">
        ${renderPetSVG(id, 'baby', 'happy', 48)}

      <button class="secondary-btn" onclick="hatchStep='name';render()">← Back</button>
    `;

      <div class="anim-hatch" style="display:inline-block">${renderPetSVG(hatchSpecies, 'egg', 'idle', 128)}</div>
      <h2 style="color:#8b5cf6;animation:bounce 0.5s infinite">Hatching...</h2>
    `;
  }

  html += '</div>';
  return html;
}

function renderPetView(pet, sleeping) {
  const daysAlive = Math.floor((simNow() - new Date(pet.bornAt).getTime()) / 86400000);

  // Runaway screen
  if (pet.ranAway) {
    return renderRunawayScreen(pet, daysAlive);
  }

  const mood = getMood(pet, sleeping);
  const moodInfo = getMoodFace(pet.hunger, pet.happiness, pet.cleanliness);
  const avg = (pet.hunger + pet.happiness + pet.cleanliness) / 3;

  let html = '';

  // Warning banners
  if (pet.criticalSince) {
    const criticalHours = (simNow() - new Date(pet.criticalSince).getTime()) / 3600000;
    const hoursLeft = Math.max(0, Math.ceil(RUNAWAY_HOURS - criticalHours));
    if (hoursLeft <= 6) {
      html += `<div class="danger-banner">
        <span class="emoji">🚨</span>
        <span>${escapeHtml(pet.name)} is about to run away! ${hoursLeft}h left — feed and care for them NOW!</span>
      </div>`;
    } else {
      html += `<div class="warning-banner">
        <span class="emoji">⚠️</span>
        <span>${escapeHtml(pet.name)} is neglected! They might run away if you don't care for them...</span>
      </div>`;
    }
  } else if (avg < 25) {
    html += `<div class="warning-banner">
      <span class="emoji">😰</span>
      <span>${escapeHtml(pet.name)} needs attention! Stats are getting low.</span>
    </div>`;
  }

  // Holiday banner
  const holiday = getActiveHoliday();
  if (holiday) {
    const hClass = getHolidayClass(holiday.key);
    html += `<div class="holiday-banner ${hClass}">${holiday.emoji} ${holiday.name}! ${holiday.emoji}</div>`;
    // Auto-unlock holiday accessory
    const holidayAcc = HOLIDAY_ACCESSORIES[holiday.key];
    if (holidayAcc && !(pet.equippedAccessories || []).includes(holidayAcc)) {
      // Just make it available (don't auto-equip)
    }
  }

  // Equipped accessories — passed into SVG renderer
  const equipped = pet.equippedAccessories || [];

  // Speech bubble
  const bubbleMsg = speechBubbleText[pet.id];
  const speechHtml = bubbleMsg ? `<div class="speech-bubble">${escapeHtml(bubbleMsg)}</div>` : '';

  // Pet display
  html += `<div class="pet-stage">
    <div class="pet-name">${escapeHtml(pet.name)}</div>
    <div class="pet-info">${pet.species} · ${pet.stage} · Day ${daysAlive}</div>
    <div class="pet-sprite-wrap">
      ${speechHtml}
      ${renderPetSVG(pet.species, pet.stage, mood, 160, equipped)}
    </div>
  </div>`;

  // Stats card
  html += `<div class="card">
    <div class="mood-row">
      <span class="mood-face">${moodInfo.face}</span>
      <span class="mood-label">${moodInfo.label}</span>
    </div>
    ${renderStatBar('🍕', 'Hunger', pet.hunger, !!(pet.earlyBirdUntil && simNow() < new Date(pet.earlyBirdUntil).getTime()))}
    ${renderStatBar('💜', 'Happiness', pet.happiness, !!(pet.earlyBirdUntil && simNow() < new Date(pet.earlyBirdUntil).getTime()))}
    ${renderStatBar('✨', 'Cleanliness', pet.cleanliness, !!(pet.earlyBirdUntil && simNow() < new Date(pet.earlyBirdUntil).getTime()))}
  </div>`;

  // Craving thought bubble
  const craving = pet.currentCraving;
  if (craving && FOODS[craving] && !sleeping) {
    html += `<div class="craving-bubble">\u{1F914}\u{1F4AD} ${FOODS[craving].emoji}</div>`;
  }

  // Early bird indicator
  if (pet.earlyBirdUntil && simNow() < new Date(pet.earlyBirdUntil).getTime() && !sleeping) {
    html += `<div class="early-bird-badge">\u2600\uFE0F Early Bird buff active!</div>`;
  }

  // Full care combo timer

      <div class="action-btn clean" style="pointer-events:none;cursor:default">
        <span class="emoji">${(pet.poopCount > 0 || (pet.messes && pet.messes.length > 0)) ? '\u{1F4A9}' : '\u2728'}</span>
        ${(pet.poopCount > 0 || (pet.messes && pet.messes.length > 0)) ? 'Tap the \u{1F4A9}!' : 'All clean!'}
      </div>
    </div>`;

    // Bath button when cleanliness < 30
    if (pet.cleanliness < 30) {
      html += `<button class="action-btn clean" style="width:100%;margin-top:8px;border-color:#93c5fd;background:#eff6ff;color:#1d4ed8" onclick="enterBathMode()">
        <span class="emoji">\u{1F6C1}</span> Bath Time!
      </button>`;
    }

    // Food picker
    if (showFoodPicker) {
      const prefs = SPECIES_FOOD_PREFS[pet.species] || { loves: [], hates: [] };
      html += `<div class="food-picker">
        <div class="food-picker-label">Pick a snack:${getCurrentMealTime() ? ' <span style="color:#22c55e">\u{1F550} ' + getCurrentMealTime().name + ' bonus!</span>' : ''}</div>
        <div class="food-grid">`;
      for (const [fid, food] of Object.entries(FOODS)) {
        const isLoved = prefs.loves.includes(fid);
        const isHated = prefs.hates.includes(fid);
        const isCraving = pet.currentCraving === fid;
        let border = '';
        let label = '';
        if (isCraving) { border = 'border-color:#fbbf24;background:#fef3c7;'; label = '\u{1F4AD}'; }
        else if (isLoved) { border = 'border-color:#86efac;background:#f0fdf4;'; label = '\u2764\uFE0F'; }
        else if (isHated) { border = 'border-color:#fca5a5;background:#fef2f2;'; label = '\u{1F44E}'; }
        html += `<button class="food-btn" style="${border}" onclick="feedPet('${activePet}','${fid}');showFoodPicker=false;render()">
          <span class="food-emoji">${food.emoji}</span>
          <span class="food-name">${food.name} ${label}</span>
          <span class="food-boost">+${food.boost}</span>
        </button>`;
      }
      html += `</div></div>`;
    }

    // Toy picker
    if (showToyPicker) {
      pet.toys = pet.toys || {};
      const favToy = SPECIES_FAV_TOY[pet.species];
      html += `<div class="food-picker">
        <div class="food-picker-label">Pick a toy:</div>
        <div class="food-grid">`;
      for (const [tid, toy] of Object.entries(TOYS)) {
        const uses = pet.toys[tid]?.usesLeft ?? 0;
        const isFav = tid === favToy;
        const border = isFav ? 'border-color:#c4b5fd;background:#faf5ff;' : '';
        const disabled = uses <= 0;
        html += `<button class="food-btn" style="${border}${disabled?'opacity:0.4;cursor:default;':''}" ${disabled?'disabled':''} onclick="useToy('${activePet}','${tid}');showToyPicker=false;render()">
          <span class="food-emoji">${toy.emoji}${isFav?' \u2764\uFE0F':''}</span>
          <span class="food-name">${toy.name}</span>
          <span class="food-boost">${uses > 0 ? uses + ' left' : 'Worn out'}</span>
        </button>`;
      }
      html += `</div></div>`;
    }

    // Interactive poops and messes (positioned in a relative container)
    const totalMesses = pet.poopCount + (pet.messes || []).length;
    if (totalMesses > 0) {
      html += `<div class="mess-area" style="position:relative;min-height:80px;margin-top:8px;border-radius:14px;background:#faf5ff;border:1px solid #e2e8f0;overflow:hidden">`;
      // Render poops
      for (let i = 0; i < pet.poopCount; i++) {
        const px = 10 + (i * 18) % 80;
        const py = 20 + ((i * 23) % 50);
        html += `<button class="mess-item anim-wobble" style="position:absolute;left:${px}%;top:${py}%;animation-delay:${i*0.15}s" onclick="cleanPoop('${activePet}',${i})">\u{1F4A9}</button>`;
      }
      // Render other messes
      const messes = pet.messes || [];
      for (let mi = 0; mi < messes.length; mi++) {
        const m = messes[mi];
        const emoji = MESS_TYPES[m.type]?.emoji || '\u{1F4A9}';
        html += `<button class="mess-item" style="position:absolute;left:${m.x}%;top:${m.y}%" onclick="cleanMess('${activePet}',${mi})">${emoji}${m.tapsLeft > 1 ? '<span class="mess-taps">' + m.tapsLeft + '</span>' : ''}</button>`;
      }
      html += `</div>`;
    }

    // Mini games row (5 games, wraps to 2 rows)
    html += `<div class="games-row">
      <button class="game-btn" onclick="startGame('catch')">
        <span class="game-icon">🎯</span>
        <span class="game-label">Catch!</span>
      </button>
      <button class="game-btn" onclick="startGame('whack')">
        <span class="game-icon">🐛</span>
        <span class="game-label">Bug Bash</span>
      </button>
      <button class="game-btn" onclick="startGame('memory')">
        <span class="game-icon">🃏</span>
        <span class="game-label">Memory</span>
      </button>
      <button class="game-btn" onclick="startGame('dance')">
        <span class="game-icon">💃</span>
        <span class="game-label">Dance Off</span>
      </button>
      <button class="game-btn" onclick="startGame('feedgame')">
        <span class="game-icon">🍽️</span>
        <span class="game-label">Feed Me!</span>
      </button>
    </div>`;

    // Dress Up + Trophies row
    html += `<div class="extra-btn-row">
      <button class="extra-btn" onclick="showAccessoryPanel=!showAccessoryPanel;showAchievementsPanel=false;render()">
        👗 Dress Up
      </button>
      <button class="extra-btn" onclick="showAchievementsPanel=!showAchievementsPanel;showAccessoryPanel=false;render()">
        🏆 Trophies <span style="font-size:11px;color:#94a3b8;margin-left:4px">${(pet.achievements||[]).length}/${Object.keys(ACHIEVEMENTS).length}</span>
      </button>
    </div>`;

    // Accessory Panel
    if (showAccessoryPanel) {
      const unlocked = getUnlockedAccessories(pet);
      html += `<div class="accessory-panel">
        <div class="accessory-panel-title">Pick accessories for ${escapeHtml(pet.name)}:</div>
        <div class="accessory-grid">`;
      for (const [id, acc] of Object.entries(ACCESSORIES)) {
        const isUnlocked = unlocked.includes(id);
        const isEquipped = (pet.equippedAccessories || []).includes(id);
        if (isUnlocked) {
          html += `<div class="accessory-item ${isEquipped ? 'equipped' : ''}" onclick="toggleAccessory('${activePet}','${id}')">
            ${isEquipped ? '<span class="acc-check">✓</span>' : ''}
            <span class="acc-emoji">${acc.emoji}</span>
            <span class="acc-name">${acc.name}</span>
          </div>`;
        } else {
          html += `<div class="accessory-item locked">
            <span class="acc-emoji">🔒</span>
            <span class="acc-name">${acc.name}</span>
            <span class="acc-hint">${getUnlockHint(acc.unlock)}</span>
          </div>`;
        }
      }
      html += `</div></div>`;
    }

    // Achievements Panel
    if (showAchievementsPanel) {
      const earned = new Set(pet.achievements || []);
      html += `<div class="achievements-panel">
        <div class="achievements-panel-title">Achievements: ${earned.size}/${Object.keys(ACHIEVEMENTS).length} unlocked</div>
        <div class="achievements-grid">`;
      for (const [id, ach] of Object.entries(ACHIEVEMENTS)) {
        const isEarned = earned.has(id);
        html += `<div class="achievement-item ${isEarned ? 'earned' : 'unearned'}">
          <span class="ach-emoji">${isEarned ? ach.emoji : '❓'}</span>
          <span class="ach-name">${isEarned ? ach.name : '???'}</span>
          <span class="ach-desc">${isEarned ? ach.desc : '???'}</span>
        </div>`;
      }
      html += `</div></div>`;
    }
  }
  html += `</div>`;

  return html;
}

function renderStatBar(emoji, label, value, earlyBird) {

function renderRunawayScreen(pet, daysAlive) {
