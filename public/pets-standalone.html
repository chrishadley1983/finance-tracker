function renderSimPanel() {
  if (!simMode) return '';
  const offsetHours = Math.round(simTimeOffset / 3600000);
  const simTime = simDate();
  const timeStr = simTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const dateStr = simTime.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});

  const pet = state.pets[activePet];
  let statusInfo = '';
  if (pet && !pet.ranAway) {
    const avg = Math.round((pet.hunger + pet.happiness + pet.cleanliness) / 3);
    const critInfo = pet.criticalSince
      ? ` | Critical for ${Math.round((simNow() - new Date(pet.criticalSince).getTime()) / 3600000)}h`
      : '';
    statusInfo = `<div class="sim-info">Avg stat: ${avg}%${critInfo} | Poops: ${pet.poopCount}</div>`;
  }

  return `<div class="sim-panel">
    <div class="sim-panel-title">⏩ Simulation Mode</div>
    <div class="sim-info" style="margin-bottom:8px">
      Sim time: <strong>${dateStr} ${timeStr}</strong> (${offsetHours >= 0 ? '+' : ''}${offsetHours}h offset)
    </div>
    <div class="sim-btn-row">
      <button class="sim-btn" onclick="simAdvance(1)">+1 hr</button>
      <button class="sim-btn" onclick="simAdvance(4)">+4 hrs</button>
      <button class="sim-btn" onclick="simAdvance(12)">+12 hrs</button>
      <button class="sim-btn" onclick="simAdvance(24)">+1 day</button>
      <button class="sim-btn" onclick="simAdvance(72)">+3 days</button>
      <button class="sim-btn danger" onclick="simAdvance(168)">+1 week</button>
    </div>
    <div class="sim-btn-row">
      <button class="sim-btn" onclick="simReset()">Reset Time</button>
      <button class="sim-sleep-toggle ${simSleepOverride ? 'active' : ''}" onclick="simSleepOverride=!simSleepOverride;render()">
        ${simSleepOverride ? '☀️ Sleep OFF' : '🌙 Sleep ON'}
      </button>
    </div>
    ${statusInfo}
  </div>`;
}

function simAdvance(hours) {
  simTimeOffset += hours * 3600000;
  render();
}

function simReset() {
  simTimeOffset = 0;
  render();
}

function toggleSimMode() {
  simMode = !simMode;
  if (!simMode) { simTimeOffset = 0; simSleepOverride = false; }
  render();
}

// ===== SOUND ENGINE (Web Audio API — no files needed) =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;

    switch (type) {
      case 'feed':
        osc.type = 'sine'; osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(660, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'pet':
        osc.type = 'sine'; osc.frequency.setValueAtTime(523, now);
        osc.frequency.linearRampToValueAtTime(784, now + 0.15);
        osc.frequency.linearRampToValueAtTime(1047, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
        break;
      case 'clean':
        osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
        osc.frequency.linearRampToValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'catch-good':
        osc.type = 'square'; osc.frequency.setValueAtTime(587, now);
        osc.frequency.setValueAtTime(784, now + 0.06);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
        break;
      case 'catch-bad':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'whack':
        osc.type = 'square'; osc.frequency.setValueAtTime(300, now);
        osc.frequency.linearRampToValueAtTime(100, now + 0.08);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
        break;
      case 'tickle':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800 + Math.random() * 600, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.06);
        osc.start(now); osc.stop(now + 0.06);
        break;
      case 'hatch':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(262, now);
        osc.frequency.setValueAtTime(330, now + 0.15);
        osc.frequency.setValueAtTime(392, now + 0.3);
        osc.frequency.setValueAtTime(523, now + 0.45);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
      case 'evolve':
        osc.type = 'sine';
        [262, 330, 392, 523, 659, 784].forEach((f, i) => {
          osc.frequency.setValueAtTime(f, now + i * 0.1);
        });
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.7);
        osc.start(now); osc.stop(now + 0.7);
        break;
      case 'runaway':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(220, now + 0.5);
        osc.frequency.linearRampToValueAtTime(110, now + 1);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.linearRampToValueAtTime(0, now + 1);
        osc.start(now); osc.stop(now + 1);
        break;
      case 'game-start':
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.setValueAtTime(554, now + 0.1);
        osc.frequency.setValueAtTime(659, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        break;
      case 'game-end':
        osc.type = 'square';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(392, now + 0.15);
        osc.frequency.setValueAtTime(330, now + 0.3);
        osc.frequency.setValueAtTime(262, now + 0.45);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.55);
        osc.start(now); osc.stop(now + 0.55);
        break;
      case 'timer-warn':
        osc.type = 'square'; osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
        break;
      case 'splash':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.linearRampToValueAtTime(900, now + 0.05);
        osc.frequency.linearRampToValueAtTime(400, now + 0.15);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'pop':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000, now);
        osc.frequency.linearRampToValueAtTime(300, now + 0.06);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
        break;
      case 'refuse':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'toy':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.08);
        osc.frequency.linearRampToValueAtTime(500, now + 0.15);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'feed-love':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
        break;
      case 'feed-hate':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.linearRampToValueAtTime(150, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'combo':
        osc.type = 'sine';
        [392, 494, 587, 784, 988].forEach((f, i) => {
          osc.frequency.setValueAtTime(f, now + i * 0.08);
        });
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
    }
  } catch (e) { /* Audio not available, fail silently */ }
}

// ===== MINI GAMES =====
let activeGame = null;
let gameState = {};
let gameTimers = [];
let catchNextId = 1;

function clearGameTimers() {
  gameTimers.forEach(t => clearTimeout(t));
  gameTimers.forEach(t => clearInterval(t));
  gameTimers = [];
}

function startGame(name) {
  activeGame = name;
  gameState = { score: 0, timeLeft: 15, running: false, ended: false };
  catchNextId = 1;
  renderGame();
}

function endGame() {
  clearGameTimers();
  gameState.running = false;
  gameState.ended = true;
  playSound('game-end');

  const pet = state.pets[activePet];
  if (pet && !pet.ranAway) {
    const boost = Math.min(Math.floor(gameState.score / 2), 25);
    pet.happiness = clamp(pet.happiness + boost);
    pet.lastUpdated = simDate().toISOString();
    pet.criticalSince = null;
    const key = activeGame;
    if (!pet.gameScores[key] || gameState.score > pet.gameScores[key]) {
      pet.gameScores[key] = gameState.score;
    }
    checkAchievements(pet);
    saveState();
    gameState.happinessGain = boost;
  }
  renderGame();
}

function closeGame() {
  clearGameTimers();
  activeGame = null;
  gameState = {};
  const overlay = document.getElementById('game-overlay');
  if (overlay) overlay.remove();
  render();
}

function beginGameRound() {
  gameState.running = true;
  gameState.timeLeft = 15;
  playSound('game-start');

  const ticker = setInterval(() => {
    gameState.timeLeft--;
    if (gameState.timeLeft <= 3 && gameState.timeLeft > 0) playSound('timer-warn');
    if (gameState.timeLeft <= 0) {
      clearInterval(ticker);
      endGame();
      return;
    }
    updateGameUI();
  }, 1000);
  gameTimers.push(ticker);

  if (activeGame === 'catch') startCatchGame();
  else if (activeGame === 'whack') startWhackGame();
  else if (activeGame === 'memory') { gameState.timeLeft = 45; startMemoryGame(); }
  else if (activeGame === 'dance') { gameState.timeLeft = 30; startDanceGame(); }
  else if (activeGame === 'feedgame') { gameState.timeLeft = 20; startFeedGame(); }

  renderGame();
}

// ---- Catch Game (DOM-based, no innerHTML re-render) ----
function startCatchGame() {
  gameState.items = {};
  const spawnItem = () => {
    if (!gameState.running) return;
    const goods = ['🍎', '🍕', '⭐', '🍦', '🎂', '💎'];
    const bads = ['💩', '🪨'];
    const isBad = Math.random() < 0.2;
    const emoji = isBad ? bads[Math.floor(Math.random() * bads.length)] : goods[Math.floor(Math.random() * goods.length)];
    const id = catchNextId++;
    const x = 10 + Math.random() * 70;

    gameState.items[id] = { emoji, x, y: -5, isBad };

    // Create DOM element directly
    const area = document.querySelector('.game-area');
    if (!area) return;
    const el = document.createElement('div');
    el.className = 'catch-item';
    el.id = 'catch-' + id;
    el.textContent = emoji;
    el.style.left = x + '%';
    el.style.top = '-5%';
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      catchItem(id);
    });
    area.appendChild(el);

    // Animate falling
    let y = -5;
    const fall = setInterval(() => {
      if (!gameState.running) { clearInterval(fall); return; }
      y += 2.5;
      const item = gameState.items[id];
      if (!item) { clearInterval(fall); return; }
      item.y = y;
      const domEl = document.getElementById('catch-' + id);
      if (domEl) domEl.style.top = y + '%';
      if (y > 105) {
        clearInterval(fall);
        delete gameState.items[id];
        if (domEl) domEl.remove();
      }
    }, 60);
    gameTimers.push(fall);
  };

  const spawner = setInterval(() => {
    if (!gameState.running) { clearInterval(spawner); return; }
    spawnItem();
  }, 800);
  gameTimers.push(spawner);
  spawnItem();
}

function catchItem(id) {
  const item = gameState.items[id];
  if (!item) return;
  if (item.isBad) {
    gameState.score = Math.max(0, gameState.score - 3);
    playSound('catch-bad');
  } else {
    gameState.score += 1;
    playSound('catch-good');
  }
  delete gameState.items[id];
  const el = document.getElementById('catch-' + id);
  if (el) el.remove();
  updateGameUI();
}

// ---- Whack-a-Mole ----
function startWhackGame() {
  gameState.holes = [0,0,0,0,0,0,0,0,0];
  const popUp = () => {
    if (!gameState.running) return;
    const emptyHoles = gameState.holes.reduce((acc, v, i) => v === 0 ? [...acc, i] : acc, []);
    if (emptyHoles.length === 0) return;
    const hole = emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
    const isBad = Math.random() < 0.15;
    gameState.holes[hole] = isBad ? 2 : 1;
    renderGame();
    const t = setTimeout(() => {
      if (gameState.holes[hole] !== 0) {
        gameState.holes[hole] = 0;
        renderGame();
      }
    }, 1200);
    gameTimers.push(t);
  };
  const spawner = setInterval(() => {
    if (!gameState.running) { clearInterval(spawner); return; }
    popUp();
  }, 600);
  gameTimers.push(spawner);
  popUp();
}

function whackHole(index) {
  if (gameState.holes[index] === 1) {
    gameState.score += 1;
    gameState.holes[index] = 0;
    playSound('whack');
  } else if (gameState.holes[index] === 2) {
    gameState.score = Math.max(0, gameState.score - 2);
    gameState.holes[index] = 0;
    playSound('catch-bad');
  }
  renderGame();
}

// ---- Memory Match ----
function startMemoryGame() {
  const emojis = ['🐶', '🐱', '🦊', '🐸', '🐵', '🐰', '🐻', '🐼'];
  const pairs = [...emojis, ...emojis];
  // Shuffle
  for (let i = pairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  gameState.cards = pairs.map((emoji, i) => ({
    id: i, emoji, flipped: false, matched: false,
  }));
  gameState.flippedCards = [];
  gameState.moves = 0;
  gameState.busy = false;
  gameState.matchedCount = 0;
}

function flipCard(index) {
  if (!gameState.running || gameState.busy) return;
  const card = gameState.cards[index];
  if (!card || card.flipped || card.matched) return;

  card.flipped = true;
  gameState.flippedCards.push(index);
  playSound('catch-good');
  renderGame();

  if (gameState.flippedCards.length === 2) {
    gameState.moves++;
    gameState.busy = true;
    const [a, b] = gameState.flippedCards;
    if (gameState.cards[a].emoji === gameState.cards[b].emoji) {
      // Match!
      gameState.cards[a].matched = true;
      gameState.cards[b].matched = true;
      gameState.matchedCount += 2;
      gameState.score += 5;
      gameState.flippedCards = [];
      gameState.busy = false;
      playSound('pet');
      renderGame();
      // Check if all matched
      if (gameState.matchedCount >= gameState.cards.length) {
        // Bonus points for time remaining
        gameState.score += gameState.timeLeft * 2;
        setTimeout(() => endGame(), 500);
      }
    } else {
      // No match — show briefly then flip back
      setTimeout(() => {
        gameState.cards[a].flipped = false;
        gameState.cards[b].flipped = false;
        gameState.flippedCards = [];
        gameState.busy = false;
        playSound('catch-bad');
        renderGame();
      }, 600);
    }
  }
}

// ---- Dance Off (Simon Says) ----
function startDanceGame() {
  const arrows = ['up', 'down', 'left', 'right'];
  const arrowEmoji = { up: '⬆️', down: '⬇️', left: '⬅️', right: '➡️' };
  const arrowFreq = { up: 523, down: 330, left: 440, right: 659 };
  gameState.danceSequence = [];
  gameState.dancePlayerIdx = 0;
  gameState.dancePhase = 'showing'; // 'showing' | 'input' | 'gameover'
  gameState.danceRound = 0;
  gameState.arrowEmoji = arrowEmoji;
  gameState.arrowFreq = arrowFreq;

  function nextRound() {
    gameState.danceRound++;
    // Add new arrows
    const count = gameState.danceRound === 1 ? 3 : 1;
    for (let i = 0; i < count; i++) {
      gameState.danceSequence.push(arrows[Math.floor(Math.random() * arrows.length)]);
    }
    gameState.dancePlayerIdx = 0;
    gameState.dancePhase = 'showing';
    gameState.danceShowIdx = 0;
    renderGame();

    // Show sequence
    let showIdx = 0;
    const showInterval = setInterval(() => {
      if (!gameState.running || gameState.dancePhase !== 'showing') { clearInterval(showInterval); return; }
      gameState.danceShowIdx = showIdx;
      // Play tone for direction
      playDanceTone(gameState.danceSequence[showIdx]);
      renderGame();
      showIdx++;
      if (showIdx >= gameState.danceSequence.length) {
        clearInterval(showInterval);
        setTimeout(() => {
          gameState.dancePhase = 'input';
          gameState.danceShowIdx = -1;
          renderGame();
        }, 500);
      }
    }, 600);
    gameTimers.push(showInterval);
  }
  gameState.nextDanceRound = nextRound;
  nextRound();
}

function playDanceTone(dir) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    const freq = { up: 523, down: 330, left: 440, right: 659 }[dir] || 440;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  } catch(e) {}
}

function danceInput(dir) {
  if (!gameState.running || gameState.dancePhase !== 'input') return;
  const expected = gameState.danceSequence[gameState.dancePlayerIdx];
  if (dir === expected) {
    playDanceTone(dir);
    gameState.dancePlayerIdx++;
    if (gameState.dancePlayerIdx >= gameState.danceSequence.length) {
      // Round complete
      gameState.score += 5;
      updateGameUI();
      setTimeout(() => {
        if (gameState.running) gameState.nextDanceRound();
      }, 500);
    }
    renderGame();
  } else {
    // Wrong - game over
    playSound('catch-bad');
    gameState.dancePhase = 'gameover';
    renderGame();
    setTimeout(() => endGame(), 1000);
  }
}

// ---- Feed The Weird Thing ----
function startFeedGame() {
  gameState.feedFoods = FEED_GAME_FOODS;
  gameState.feedSpeed = 3000; // ms between cravings getting faster
  gameState.feedReaction = '';
  newFeedCraving();
}

function newFeedCraving() {
  if (!gameState.running) return;
  const foods = gameState.feedFoods;
  const craving = foods[Math.floor(Math.random() * foods.length)];
  // Pick 3 wrong options + 1 correct, shuffle
  const wrong = foods.filter(f => f !== craving);
  const options = [craving];
  while (options.length < 4 && wrong.length > 0) {
    const idx = Math.floor(Math.random() * wrong.length);
    options.push(wrong.splice(idx, 1)[0]);
  }
  // Shuffle options
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  gameState.feedCraving = craving;
  gameState.feedOptions = options;
  gameState.feedReaction = '';
  renderGame();
}

function feedGamePick(food) {
  if (!gameState.running) return;
  if (food === gameState.feedCraving) {
    gameState.score += 3;
    gameState.feedReaction = '😋';
    playSound('catch-good');
    renderGame();
    // Speed up slightly
    gameState.feedSpeed = Math.max(1000, gameState.feedSpeed - 200);
    setTimeout(() => {
      if (gameState.running) newFeedCraving();
    }, 500);
  } else {
    gameState.score = Math.max(0, gameState.score - 1);
    gameState.feedReaction = '🤢';
    playSound('catch-bad');
    renderGame();
    setTimeout(() => {
      gameState.feedReaction = '';
      renderGame();
    }, 500);
  }
  updateGameUI();
}

// Update just the score/timer without replacing game area DOM
function updateGameUI() {
  const scoreEl = document.querySelector('.game-score');
  if (scoreEl) scoreEl.textContent = 'Score: ' + gameState.score;
  const timerEl = document.querySelector('.game-timer');
  if (timerEl) timerEl.textContent = '⏱️ ' + gameState.timeLeft + 's';
  // Update moves counter for memory
  const movesEl = document.querySelector('.memory-moves');
  if (movesEl) movesEl.textContent = 'Moves: ' + (gameState.moves || 0);
}

function renderGame() {
  let overlay = document.getElementById('game-overlay');
  if (!overlay) {
    const div = document.createElement('div');
    div.id = 'game-overlay';
    div.className = 'game-overlay';
    document.body.appendChild(div);
    overlay = div;
  }

  const titles = { catch: '🎯 Catch!', whack: '🐛 Bug Bash!', memory: '🃏 Memory Match!', dance: '💃 Dance Off!', feedgame: '🍽️ Feed Me!' };

  if (gameState.ended) {
    overlay.innerHTML = `
      <div class="game-header">
        <h3>${titles[activeGame]}</h3>
        <button class="game-close-btn" onclick="closeGame()">✕</button>
      </div>
      <div class="game-end-screen">
        <h2>Time's Up!</h2>
        <div class="final-score">${gameState.score}</div>
        <div class="happiness-gain">+${gameState.happinessGain || 0} happiness 💜</div>
        <button class="primary-btn" style="max-width:200px" onclick="closeGame()">Done!</button>
      </div>`;
    return;
  }

  if (!gameState.running) {
    const pet = state.pets[activePet];
    overlay.innerHTML = `
      <div class="game-header">
        <h3>${titles[activeGame]}</h3>
        <button class="game-close-btn" onclick="closeGame()">✕</button>
      </div>
      <div class="game-start-screen">
        ${pet ? renderPetSVG(pet.species, pet.stage, 'happy', 100) : ''}
        <h2 style="margin:16px 0 8px">${titles[activeGame]}</h2>
        <p style="color:#64748b;margin-bottom:4px">${
          activeGame === 'catch' ? 'Tap the falling food! Avoid the poop!' :
          activeGame === 'whack' ? 'Tap the bugs! Don\'t hit the flowers!' :
          activeGame === 'memory' ? 'Find all the matching pairs!' :
          activeGame === 'dance' ? 'Watch the sequence, then repeat it!' :
          'Feed your pet what they want!'
        }</p>
        <p style="color:#94a3b8;font-size:13px;margin-bottom:20px">${
          activeGame === 'memory' ? '45 seconds' :
          activeGame === 'dance' ? '30 seconds' :
          activeGame === 'feedgame' ? '20 seconds' :
          '15 seconds'
        } — GO!</p>
        <button class="primary-btn" style="max-width:200px" onclick="beginGameRound()">Start!</button>
      </div>`;
    return;
  }

  // Active game area
  let gameArea = '';
  if (activeGame === 'catch') {
    // Catch items are added directly to DOM via startCatchGame, not via innerHTML
    gameArea = '';
  } else if (activeGame === 'whack') {
    const holes = (gameState.holes || []).map((val, i) => {
      const content = val === 1 ? '🐛' : val === 2 ? '🌸' : '';
      return `<div class="mole-hole ${val ? 'active' : ''}" onclick="whackHole(${i})">${content}</div>`;
    }).join('');
    gameArea = `<div class="mole-grid">${holes}</div>`;
  } else if (activeGame === 'memory') {
    const cards = (gameState.cards || []).map((card, i) => {
      const cls = card.matched ? 'memory-card matched' : card.flipped ? 'memory-card flipped' : 'memory-card';
      return `<div class="${cls}" onclick="flipCard(${i})"><span class="card-face">${card.emoji}</span></div>`;
    }).join('');
    gameArea = `<div class="memory-grid">${cards}</div>
      <div class="memory-moves">Moves: ${gameState.moves || 0}</div>`;
  } else if (activeGame === 'dance') {
    const arrowEmoji = gameState.arrowEmoji || { up: '⬆️', down: '⬇️', left: '⬅️', right: '➡️' };
    const seq = gameState.danceSequence || [];
    const phase = gameState.dancePhase || 'showing';
    const showIdx = gameState.danceShowIdx ?? -1;
    const playerIdx = gameState.dancePlayerIdx || 0;

    let seqHtml = '<div class="dance-sequence">';
    seq.forEach((dir, i) => {
      let cls = 'dance-arrow';
      if (phase === 'showing' && i === showIdx) cls += ' highlight';
      else if (phase === 'input' && i < playerIdx) cls += ' correct';
      seqHtml += `<span class="${cls}">${arrowEmoji[dir]}</span>`;
    });
    seqHtml += '</div>';

    const roundLabel = `<div class="dance-round-label">Round ${gameState.danceRound || 1}</div>`;
    const inputDisabled = phase !== 'input';
    const buttons = `<div class="dance-buttons">
      <button class="dance-btn up" ${inputDisabled ? 'disabled' : ''} onclick="danceInput('up')">⬆️</button>
      <button class="dance-btn left" ${inputDisabled ? 'disabled' : ''} onclick="danceInput('left')">⬅️</button>
      <button class="dance-btn down" ${inputDisabled ? 'disabled' : ''} onclick="danceInput('down')">⬇️</button>
      <button class="dance-btn right" ${inputDisabled ? 'disabled' : ''} onclick="danceInput('right')">➡️</button>
    </div>`;

    gameArea = `${roundLabel}${seqHtml}${buttons}`;
  } else if (activeGame === 'feedgame') {
    const craving = gameState.feedCraving || '';
    const options = gameState.feedOptions || [];
    const reaction = gameState.feedReaction || '';
    const pet = state.pets[activePet];

    gameArea = `<div class="feed-game-area">
      ${pet ? renderPetSVG(pet.species, pet.stage, reaction === '😋' ? 'happy' : reaction === '🤢' ? 'sad' : 'idle', 80) : ''}
      ${reaction ? `<div class="feed-reaction">${reaction}</div>` : ''}
      <div class="feed-craving-label">I want...</div>
      <div class="feed-craving">${craving}</div>
      <div class="feed-options">
        ${options.map(f => `<button class="feed-option-btn" onclick="feedGamePick('${f}')">${f}</button>`).join('')}
      </div>
    </div>`;
  }

  overlay.innerHTML = `
    <div class="game-header">
      <h3>${titles[activeGame]}</h3>
      <span class="game-score">Score: ${gameState.score}</span>
      <button class="game-close-btn" onclick="closeGame()">✕</button>
    </div>
    <div class="game-area">
      <div class="game-timer">⏱️ ${gameState.timeLeft}s</div>
      ${gameArea}
    </div>`;
}

// ===== EVENT HANDLERS =====
function switchPet(id) {
  activePet = id;
  showFoodPicker = false;
  showToyPicker = false;
  showAccessoryPanel = false;
  showAchievementsPanel = false;
  pettingMode = false;
  bathMode = false;
  hatchStep = 'name';
  hatchName = '';
  hatchSpecies = null;
  render();
}

function goToSpecies() {
  if (!hatchName.trim()) return;
  hatchStep = 'species';
  render();
}

function selectSpecies(id) {
  hatchSpecies = id;
  render();
}

function doHatch() {
  if (!hatchName.trim() || !hatchSpecies) return;
  hatchStep = 'hatching';
  render();
  setTimeout(() => {
    playSound('hatch');
    createPet(activePet, hatchName.trim(), hatchSpecies);
    hatchStep = 'name';
    hatchName = '';
    hatchSpecies = null;
    render();
  }, 1500);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ===== INIT =====
render();
// Refresh every 60s for decay
setInterval(render, 60000);

// Re-enable input focus after render (name input loses focus on re-render)
const observer = new MutationObserver(() => {
  const input = document.querySelector('.name-input');
  if (input && document.activeElement !== input) {
    // Don't steal focus
  }
});
observer.observe(document.getElementById('app'), { childList: true, subtree: true });
</script>
